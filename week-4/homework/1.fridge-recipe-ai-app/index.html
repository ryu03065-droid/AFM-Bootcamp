<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냉장고 재료 &amp; 레시피 관리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* 따뜻한 크림/버터 배경 */
      --cream:      #fbf3e2;   /* 메인 배경 */
      --cream-2:    #fdf8ee;   /* 밝은 크림 (카드) */
      --butter:     #f6e7c6;   /* 버터색 */
      --paper:      #fffdf7;   /* 종이/입력창 */
      /* 테라코타 / 주황 / 갈색 포인트 */
      --terra:      #c96b4a;   /* 테라코타 */
      --terra-deep: #b0563a;
      --orange:     #e0954a;   /* 따뜻한 주황 */
      --orange-soft:#f2b872;
      --brown:      #6b4a30;   /* 진한 나무 갈색 (텍스트) */
      --brown-mute: #a98a6a;   /* 부드러운 갈색 (보조 텍스트) */
      /* 올리브 그린 액센트 */
      --olive:      #7d8c4f;
      --olive-deep: #647040;
      --olive-soft: #eef0dd;
      /* 라인 */
      --line:       #e6d5b3;
      --line-soft:  #efe2c6;
      --shadow:     rgba(120, 80, 40, 0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Gowun Dodum', 'Apple SD Gothic Neo', sans-serif;
      color: var(--brown);
      background:
        radial-gradient(1000px 520px at 12% -10%, rgba(224,149,74,0.12), transparent 60%),
        radial-gradient(760px 480px at 100% 4%, rgba(201,107,74,0.10), transparent 58%),
        radial-gradient(720px 560px at 50% 118%, rgba(125,140,79,0.10), transparent 60%),
        var(--cream);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    /* 아늑한 체크무늬 행주 텍스처 (아주 은은하게) */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(201,107,74,0.045) 2px, transparent 2px),
        linear-gradient(90deg, rgba(201,107,74,0.045) 2px, transparent 2px);
      background-size: 52px 52px;
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; }

    /* ===== 헤더 ===== */
    header {
      position: relative;
      max-width: 820px;
      margin: 0 auto;
      padding: 44px 24px 8px;
    }
    .brand {
      display: flex; align-items: center; gap: 18px;
    }
    .logo {
      width: 64px; height: 64px; flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 32px;
      border-radius: 22px;
      background: linear-gradient(150deg, #ffe9c4, #f7cf94);
      border: 2px solid #e6c690;
      box-shadow:
        0 6px 0 #e4b878,
        0 12px 24px var(--shadow);
      transform: rotate(-4deg);
    }
    header h1 {
      font-family: 'Jua', sans-serif;
      font-size: 33px; font-weight: 400; line-height: 1.1;
      letter-spacing: -0.3px;
      color: var(--brown);
    }
    header h1 b {
      color: var(--terra);
      font-weight: 400;
    }
    header p {
      font-family: 'Gaegu', sans-serif;
      font-size: 17px; color: var(--brown-mute); margin-top: 6px;
      letter-spacing: 0.2px;
      font-weight: 700;
    }
    .divider {
      max-width: 820px; margin: 22px auto 0; padding: 0 24px;
    }
    .divider .bar {
      height: 3px; border-radius: 3px;
      background:
        repeating-linear-gradient(90deg,
          var(--orange-soft) 0 14px,
          transparent 14px 28px);
      opacity: .55;
    }

    /* ===== 탭 ===== */
    .tabs {
      max-width: 820px;
      margin: 26px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 12px;
    }
    .tab-btn {
      flex: 1;
      position: relative;
      padding: 16px 16px;
      border: 2px solid var(--line);
      background: var(--cream-2);
      font-family: 'Jua', sans-serif;
      font-size: 16px;
      font-weight: 400;
      cursor: pointer;
      color: var(--brown-mute);
      border-radius: 18px;
      transition: all .18s ease;
      box-shadow: 0 4px 0 var(--line-soft);
    }
    .tab-btn:hover { color: var(--brown); border-color: var(--orange-soft); transform: translateY(-1px); }
    .tab-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--terra), var(--orange));
      border-color: var(--terra-deep);
      box-shadow: 0 5px 0 var(--terra-deep), 0 10px 20px rgba(201,107,74,0.28);
    }

    .tab-content {
      display: none;
      max-width: 820px;
      margin: 0 auto;
      padding: 28px 24px 64px;
    }
    .tab-content.active { display: block; animation: fade .34s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ===== 입력 카드 ===== */
    .form-box {
      background: linear-gradient(180deg, var(--cream-2), var(--paper));
      border: 2px solid var(--line);
      border-radius: 24px;
      padding: 26px;
      margin-bottom: 30px;
      box-shadow: 0 14px 30px var(--shadow);
    }
    .form-box h2 {
      font-family: 'Jua', sans-serif;
      font-size: 20px; font-weight: 400; margin-bottom: 20px;
      color: var(--brown);
      display: flex; align-items: center; gap: 10px;
      letter-spacing: -0.2px;
    }
    .form-box h2 .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--olive);
      box-shadow: 0 0 0 4px var(--olive-soft);
    }
    .field-label {
      display: block;
      font-family: 'Gaegu', sans-serif;
      font-size: 15px; font-weight: 700;
      color: var(--brown-mute);
      letter-spacing: 0.3px;
      margin: 0 0 9px 4px;
    }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
    .form-row:last-of-type { margin-bottom: 0; }
    input[type="text"], .form-row input:not([type="hidden"]), .form-row textarea {
      flex: 1;
      min-width: 150px;
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--line);
      border-radius: 14px;
      font-size: 15px;
      font-family: 'Gowun Dodum', sans-serif;
      background: var(--paper);
      color: var(--brown);
      outline: none;
      transition: border-color .16s, box-shadow .16s, background .16s;
    }
    input::placeholder, textarea::placeholder { color: #c3ab8a; }
    input:focus, textarea:focus {
      border-color: var(--orange);
      background: #fffdf5;
      box-shadow: 0 0 0 4px rgba(224,149,74,0.16);
    }
    textarea { resize: vertical; min-height: 96px; line-height: 1.7; }

    /* ===== 카테고리 토글 버튼 그룹 ===== */
    .category-group {
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .cat-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 16px;
      border: 2px solid var(--line);
      background: var(--paper);
      color: var(--brown-mute);
      border-radius: 999px;
      font-size: 14.5px;
      font-family: 'Gaegu', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all .16s ease;
      user-select: none;
    }
    .cat-btn:hover {
      color: var(--brown);
      border-color: var(--orange-soft);
      transform: translateY(-1px);
    }
    .cat-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--olive), var(--olive-deep));
      border-color: var(--olive-deep);
      box-shadow: 0 4px 12px rgba(125,140,79,0.35);
    }

    .btn-add {
      width: 100%;
      margin-top: 24px;
      background: linear-gradient(135deg, var(--terra), var(--orange));
      color: #fff;
      border: 2px solid var(--terra-deep);
      padding: 16px 20px;
      border-radius: 16px;
      font-size: 17px;
      font-family: 'Jua', sans-serif;
      font-weight: 400;
      letter-spacing: 0.3px;
      cursor: pointer;
      box-shadow: 0 5px 0 var(--terra-deep), 0 10px 22px rgba(201,107,74,0.28);
      transition: transform .12s, box-shadow .12s, filter .12s;
    }
    .btn-add:hover { filter: brightness(1.04); }
    .btn-add:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--terra-deep), 0 4px 10px rgba(201,107,74,0.22); }

    .section-title {
      font-family: 'Jua', sans-serif;
      font-size: 18px; font-weight: 400; color: var(--brown);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
      letter-spacing: 0.2px;
    }
    .section-title .count {
      font-family: 'Gaegu', sans-serif;
      font-size: 14px; font-weight: 700;
      color: var(--olive-deep);
      background: var(--olive-soft);
      border: 2px solid #d7dcae;
      padding: 2px 11px;
      border-radius: 999px;
    }

    /* ===== 재료 태그 영역 (나무 도마 느낌) ===== */
    .tag-area {
      background:
        radial-gradient(700px 220px at 50% 0%, rgba(224,149,74,0.10), transparent 70%),
        linear-gradient(180deg, #f7ead0, #f2e0bf);
      border: 2px solid #e6cfa2;
      border-radius: 24px;
      padding: 24px;
      min-height: 140px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-content: flex-start;
      box-shadow: inset 0 3px 10px rgba(150,110,60,0.10);
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--paper);
      color: var(--brown);
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 9px 12px 9px 16px;
      font-size: 15px;
      font-family: 'Gaegu', sans-serif;
      font-weight: 700;
      box-shadow: 0 3px 8px rgba(150,110,60,0.12);
      transition: transform .14s, border-color .14s, box-shadow .14s;
    }
    .tag:hover {
      transform: translateY(-2px) rotate(-1deg);
      border-color: var(--orange-soft);
      box-shadow: 0 6px 16px rgba(224,149,74,0.22);
    }
    /* 카테고리 배지 */
    .tag em {
      font-style: normal;
      font-size: 12px;
      font-weight: 700;
      background: var(--olive-soft);
      color: var(--olive-deep);
      border: 1.5px solid #d7dcae;
      padding: 2px 10px;
      border-radius: 999px;
      letter-spacing: 0.2px;
    }
    .tag button {
      background: var(--butter);
      border: none;
      color: var(--brown-mute);
      width: 23px; height: 23px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      display: grid; place-items: center;
      transition: background .14s, color .14s, transform .14s;
    }
    .tag button:hover { background: var(--terra); color: #fff; transform: rotate(90deg); }

    /* ===== 레시피 카드 (요리 카드 / 종이 레시피) ===== */
    .card {
      position: relative;
      background: linear-gradient(180deg, var(--cream-2), var(--paper));
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 22px 22px 22px 26px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      overflow: hidden;
      box-shadow: 0 10px 24px var(--shadow);
      transition: transform .14s, box-shadow .14s, border-color .14s;
    }
    /* 왼쪽 따뜻한 엣지 */
    .card::before {
      content: "";
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 6px;
      background: linear-gradient(180deg, var(--terra), var(--orange));
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--orange-soft);
      box-shadow: 0 16px 30px rgba(150,110,60,0.20);
    }
    .card-info { flex: 1; display: flex; flex-direction: column; gap: 11px; min-width: 0; }
    .name {
      font-family: 'Jua', sans-serif;
      font-size: 21px; font-weight: 400; color: var(--brown);
      letter-spacing: -0.2px;
    }
    .meta {
      font-family: 'Gaegu', sans-serif;
      font-size: 15px; color: var(--olive-deep); font-weight: 700;
      background: var(--olive-soft);
      border: 1.5px solid #d7dcae;
      border-radius: 12px;
      padding: 8px 12px;
      display: inline-block;
      width: fit-content;
      max-width: 100%;
      word-break: break-word;
    }
    .steps {
      font-size: 15px; color: var(--brown-mute); line-height: 2;
      margin-top: 2px;
      border-top: 2px dashed var(--line);
      padding-top: 13px;
    }

    .btn-delete {
      background: var(--paper);
      color: var(--brown-mute);
      border: 2px solid var(--line);
      padding: 9px 15px;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Gaegu', sans-serif;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .14s;
    }
    .btn-delete:hover { background: #fbeae2; color: var(--terra); border-color: var(--terra); }

    .empty {
      font-family: 'Gaegu', sans-serif;
      color: var(--brown-mute);
      font-size: 17px; font-weight: 700;
      text-align: center;
      padding: 40px 0;
      width: 100%;
    }

    @media (max-width: 560px) {
      header { padding-top: 32px; }
      header h1 { font-size: 27px; }
      .logo { width: 56px; height: 56px; font-size: 28px; }
      .tab-btn { font-size: 15px; padding: 14px 8px; }
      .card { flex-direction: column; }
      .btn-delete { align-self: flex-end; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="logo">🍲</div>
      <div>
        <h1>우리집 <b>냉장고</b> &amp; 레시피</h1>
        <p>냉장고 속 재료를 챙기고, 따뜻한 나만의 레시피를 기록해요 🌿</p>
      </div>
    </div>
  </header>
  <div class="divider"><div class="bar"></div></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="ingredients" onclick="showTab('ingredients')">🧺 냉장고 재료</button>
    <button class="tab-btn" data-tab="recipes" onclick="showTab('recipes')">📖 레시피</button>
  </div>

  <!-- 재료 탭 -->
  <div class="tab-content active" id="tab-ingredients">
    <div class="form-box">
      <h2><span class="dot"></span> 재료 등록</h2>

      <div class="form-row">
        <div style="flex:1; min-width:150px;">
          <label class="field-label" for="ing-name">재료 이름</label>
          <input type="text" id="ing-name" placeholder="예: 달걀, 김치, 대파 (엔터로 추가)" />
        </div>
      </div>

      <div>
        <label class="field-label">카테고리</label>
        <!-- client.js 가 값을 읽는 hidden input -->
        <input type="hidden" id="ing-category" value="" />
        <!-- 보이는 토글 버튼 그룹 (9개) -->
        <div class="category-group">
          <button type="button" class="cat-btn" onclick="selectCategory(this, '단백질')">🥩 단백질</button>
          <button type="button" class="cat-btn" onclick="selectCategory(this, '채소')">🥦 채소</button>
          <button type="button" class="cat-btn" onclick="selectCategory(this, '탄수화물')">🍚 탄수화물</button>
          <button type="button" class="cat-btn" onclick="selectCategory(this, '유제품')">🧀 유제품</button>
          <button type="button" class="cat-btn" onclick="selectCategory(this, '양념/소스')">🧂 양념/소스</button>
          <button type="button" class="cat-btn" onclick="selectCategory(this, '계란/두부')">🍳 계란/두부</button>
          <button type="button" class="cat-btn" onclick="selectCategory(this, '통조림')">🥫 통조림</button>
          <button type="button" class="cat-btn" onclick="selectCategory(this, '향신채')">🌿 향신채</button>
          <button type="button" class="cat-btn" onclick="selectCategory(this, '기타')">🫙 기타</button>
        </div>
      </div>

      <button type="button" class="btn-add" onclick="addIngredient()">＋ 냉장고에 넣기</button>
    </div>

    <div class="section-title">🧺 냉장고 재료 목록</div>
    <div class="tag-area" id="ingredient-list">
      <p class="empty">불러오는 중...</p>
    </div>
  </div>

  <!-- 레시피 탭 -->
  <div class="tab-content" id="tab-recipes">

    <!-- AI 레시피 생성 -->
    <div class="form-box" id="ai-box">
      <h2><span class="dot" style="background:var(--terra);box-shadow:0 0 0 4px #f6ddd0"></span> 🍳 AI 레시피 자동 생성</h2>
      <p style="font-family:'Gaegu',sans-serif;font-size:16px;font-weight:700;color:var(--brown-mute);margin-bottom:16px;">냉장고 재료를 AI에게 살짝 보여주면 따뜻한 레시피를 뚝딱 만들어줘요!</p>

      <label class="field-label">조리 스타일</label>
      <div class="category-group" style="margin-bottom:18px;">
        <button type="button" class="cat-btn style-btn active" onclick="selectStyle(this,'아무거나')">✨ 아무거나</button>
        <button type="button" class="cat-btn style-btn" onclick="selectStyle(this,'간단요리')">⚡ 간단요리</button>
        <button type="button" class="cat-btn style-btn" onclick="selectStyle(this,'다이어트')">🥗 다이어트</button>
        <button type="button" class="cat-btn style-btn" onclick="selectStyle(this,'야식')">🌙 야식</button>
      </div>
      <input type="hidden" id="ai-style" value="아무거나" />

      <button type="button" class="btn-add" id="ai-gen-btn" onclick="generateRecipe()" style="background:linear-gradient(135deg,var(--olive),var(--olive-deep));border-color:var(--olive-deep);box-shadow:0 5px 0 var(--olive-deep),0 10px 22px rgba(125,140,79,0.30);">
        🤖 AI 레시피 생성하기
      </button>

      <!-- 생성된 레시피 미리보기 -->
      <div id="ai-preview" style="display:none;margin-top:22px;border-top:2px dashed var(--line);padding-top:20px;">
        <div style="font-family:'Gaegu',sans-serif;font-size:15px;font-weight:700;color:var(--brown-mute);margin-bottom:12px;">✨ AI가 정성껏 만든 레시피</div>
        <div id="ai-result-card" class="card" style="margin-bottom:14px;">
          <div class="card-info">
            <span class="name" id="ai-title"></span>
            <p class="meta" id="ai-ingredients-text"></p>
            <p class="steps" id="ai-steps-text"></p>
            <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;">
              <span style="font-family:'Gaegu',sans-serif;font-size:14px;font-weight:700;background:#fbe7d3;color:var(--terra-deep);border:1.5px solid #eac9a0;border-radius:10px;padding:5px 11px;" id="ai-time"></span>
              <span style="font-family:'Gaegu',sans-serif;font-size:14px;font-weight:700;background:#fbe7d3;color:var(--terra-deep);border:1.5px solid #eac9a0;border-radius:10px;padding:5px 11px;" id="ai-difficulty"></span>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:10px;">
          <button type="button" onclick="saveAiRecipe()" style="flex:1;padding:13px;background:linear-gradient(135deg,var(--terra),var(--orange));color:#fff;border:2px solid var(--terra-deep);border-radius:14px;font-family:'Jua',sans-serif;font-size:15px;cursor:pointer;box-shadow:0 4px 0 var(--terra-deep);">💾 저장하기</button>
          <button type="button" onclick="generateRecipe()" style="flex:1;padding:13px;background:var(--paper);color:var(--brown-mute);border:2px solid var(--line);border-radius:14px;font-family:'Jua',sans-serif;font-size:15px;cursor:pointer;">🔄 다시 생성</button>
        </div>
      </div>
    </div>

    <div class="form-box">
      <h2><span class="dot"></span> 레시피 직접 작성</h2>

      <div class="form-row">
        <div style="flex:1; min-width:150px;">
          <label class="field-label" for="rec-title">요리 이름</label>
          <input type="text" id="rec-title" placeholder="예: 김치볶음밥" />
        </div>
      </div>

      <div class="form-row">
        <div style="flex:1; min-width:150px;">
          <label class="field-label" for="rec-ingredients">재료</label>
          <textarea id="rec-ingredients" placeholder="예: 달걀 2개, 김치 100g, 밥 1공기"></textarea>
        </div>
      </div>

      <div class="form-row">
        <div style="flex:1; min-width:150px;">
          <label class="field-label" for="rec-steps">조리법</label>
          <textarea id="rec-steps" placeholder="예:&#10;1. 팬에 기름을 두르고&#10;2. 달걀을 깨서 넣고&#10;3. 김치를 넣어 볶는다"></textarea>
        </div>
      </div>

      <button type="button" class="btn-add" onclick="addRecipe()">＋ 레시피북에 저장</button>
    </div>

    <div class="section-title">📖 저장된 레시피</div>
    <div id="recipe-list"></div>
  </div>

</div>

<script>
  // 조리 스타일 선택
  function selectStyle(el, value) {
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('ai-style').value = value;
  }

  // 카테고리 토글 (client.js 아님 — index.html 전용)
  function selectCategory(el, value) {
    const hidden = document.getElementById('ing-category');
    // 이미 선택된 걸 다시 누르면 해제
    if (el.classList.contains('active')) {
      el.classList.remove('active');
      hidden.value = '';
      return;
    }
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    hidden.value = value;
  }

  // 재료 추가 후 카테고리 선택 상태도 초기화 (addIngredient 는 hidden input 만 비움)
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.btn-add');
    if (btn && btn.getAttribute('onclick') === 'addIngredient()') {
      // addIngredient 실행 직후 hidden value 가 비워지므로 버튼 활성도 동기화
      setTimeout(() => {
        if (!document.getElementById('ing-category').value) {
          document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        }
      }, 0);
    }
  });
</script>
<script src="client.js"></script>
</body>
</html>
