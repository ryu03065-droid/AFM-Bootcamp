<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할 일 목록</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ 모든 CDN 버전 고정. Babel 은 반드시 7.x (8.x 인라인 변환 미지원) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ========================================
    // 📡 API 설정
    // ========================================
    const API_BASE_URL = window.location.origin + '/api';

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 ${className}`}>
          {children}
        </div>
      );
    }

    function ProgressBar({ value, max }) {
      const percent = max > 0 ? Math.round((value / max) * 100) : 0;
      return (
        <div className="w-full">
          <div className="flex items-center justify-between mb-2">
            <span className="text-sm font-medium text-slate-600">진행률</span>
            <span className="text-sm font-semibold text-indigo-600">
              {value}/{max} 완료 ({percent}%)
            </span>
          </div>
          <div
            className="w-full h-3 bg-slate-200 rounded-full overflow-hidden"
            role="progressbar"
            aria-valuenow={value}
            aria-valuemin={0}
            aria-valuemax={max}
          >
            <div
              className="h-full bg-gradient-to-r from-indigo-500 to-violet-500 rounded-full transition-all duration-500 ease-out"
              style={{ width: `${percent}%` }}
            />
          </div>
        </div>
      );
    }

    function Checkbox({ checked, onChange, label }) {
      return (
        <button
          type="button"
          onClick={onChange}
          aria-pressed={checked}
          aria-label={label}
          className={`flex-shrink-0 w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors duration-200
            ${checked
              ? 'bg-indigo-500 border-indigo-500'
              : 'bg-white border-slate-300 hover:border-indigo-400'}`}
        >
          {checked && (
            <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3">
              <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
            </svg>
          )}
        </button>
      );
    }

    function Spinner() {
      return (
        <div className="flex flex-col items-center justify-center py-20 gap-4">
          <div className="w-10 h-10 border-4 border-indigo-200 border-t-indigo-500 rounded-full animate-spin" />
          <p className="text-slate-500 text-sm">할 일을 불러오는 중...</p>
        </div>
      );
    }

    // ========================================
    // ➕ Add Todo Form Component
    // ========================================
    function AddTodoForm({ onAdd }) {
      const [title, setTitle] = useState('');
      const [submitting, setSubmitting] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!title.trim()) return;
        setSubmitting(true);
        try {
          const res = await fetch(`${API_BASE_URL}/todos`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: title.trim(), details: [] }),
          });
          if (!res.ok) throw new Error();
          const newTodo = await res.json();
          onAdd(newTodo);
          setTitle('');
        } catch {
          alert('추가에 실패했습니다. 다시 시도해 주세요.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <Card className="p-4 mb-6">
          <form onSubmit={handleSubmit} className="flex gap-3">
            <input
              type="text"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="새 할 일 추가..."
              className="flex-1 px-4 py-2 rounded-xl border border-slate-200 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-400"
            />
            <button
              type="submit"
              disabled={!title.trim() || submitting}
              className="px-4 py-2 bg-indigo-500 hover:bg-indigo-600 disabled:opacity-40 text-white text-sm font-medium rounded-xl transition-colors"
            >
              {submitting ? '추가 중...' : '+ 추가'}
            </button>
          </form>
        </Card>
      );
    }

    // ========================================
    // 🧩 Todo Item Component
    // ========================================
    function TodoItem({ todo, onToggle, onDelete }) {
      const [deleting, setDeleting] = useState(false);

      const handleDelete = async () => {
        setDeleting(true);
        try {
          const res = await fetch(`${API_BASE_URL}/todos/${todo.id}`, { method: 'DELETE' });
          if (!res.ok) throw new Error();
          onDelete(todo.id);
        } catch {
          alert('삭제에 실패했습니다.');
          setDeleting(false);
        }
      };

      return (
        <Card className={`p-5 transition-all duration-200 ${todo.completed ? 'opacity-60' : 'hover:shadow-md'}`}>
          <div className="flex items-start gap-4">
            <div className="pt-0.5">
              <Checkbox
                checked={todo.completed}
                onChange={() => onToggle(todo.id)}
                label={`${todo.title} 완료 표시`}
              />
            </div>
            <div className="flex-1 min-w-0">
              <h3
                onClick={() => onToggle(todo.id)}
                className={`text-lg font-semibold cursor-pointer select-none transition-colors
                  ${todo.completed ? 'line-through text-slate-400' : 'text-slate-800'}`}
              >
                {todo.title}
              </h3>
              {todo.details && todo.details.length > 0 && (
                <ul className="mt-2 space-y-1">
                  {todo.details.map((detail, idx) => (
                    <li
                      key={idx}
                      className={`flex items-start gap-2 text-sm transition-colors
                        ${todo.completed ? 'line-through text-slate-400' : 'text-slate-600'}`}
                    >
                      <span className="text-indigo-400 mt-1 flex-shrink-0">•</span>
                      <span>{detail}</span>
                    </li>
                  ))}
                </ul>
              )}
            </div>
            <div className="flex-shrink-0 flex items-center gap-2">
              {todo.completed && (
                <span className="text-xs font-medium text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full">
                  완료
                </span>
              )}
              <button
                onClick={handleDelete}
                disabled={deleting}
                className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors disabled:opacity-40"
                aria-label="삭제"
              >
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
              </button>
            </div>
          </div>
        </Card>
      );
    }

    // ========================================
    // 📄 Todo App Page
    // ========================================
    function TodoApp() {
      const [todos, setTodos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        let cancelled = false;
        fetch(`${API_BASE_URL}/todos`)
          .then((res) => {
            if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
            return res.json();
          })
          .then((data) => {
            if (!cancelled) setTodos(data);
          })
          .catch((err) => {
            if (!cancelled) setError(err.message);
          })
          .finally(() => {
            if (!cancelled) setLoading(false);
          });
        return () => { cancelled = true; };
      }, []);

      const handleToggle = async (id) => {
        const todo = todos.find((t) => t.id === id);
        if (!todo) return;
        const newCompleted = !todo.completed;
        setTodos((prev) =>
          prev.map((t) => (t.id === id ? { ...t, completed: newCompleted } : t))
        );
        try {
          await fetch(`${API_BASE_URL}/todos/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ completed: newCompleted }),
          });
        } catch {
          // Revert on failure
          setTodos((prev) =>
            prev.map((t) => (t.id === id ? { ...t, completed: todo.completed } : t))
          );
        }
      };

      const handleAdd = (newTodo) => {
        setTodos((prev) => [...prev, newTodo]);
      };

      const handleDelete = (id) => {
        setTodos((prev) => prev.filter((t) => t.id !== id));
      };

      const completedCount = useMemo(
        () => todos.filter((t) => t.completed).length,
        [todos]
      );

      return (
        <div className="min-h-screen py-10 px-4">
          <div className="max-w-2xl mx-auto">
            {/* 헤더 */}
            <header className="mb-8 text-center">
              <h1 className="text-3xl sm:text-4xl font-bold text-slate-800">📝 할 일 목록</h1>
              <p className="mt-2 text-slate-500">오늘 해야 할 일들을 확인하고 완료해 보세요</p>
            </header>

            {/* 진행률 */}
            {!loading && !error && todos.length > 0 && (
              <Card className="p-5 mb-6">
                <ProgressBar value={completedCount} max={todos.length} />
              </Card>
            )}

            {/* 추가 폼 */}
            {!loading && !error && <AddTodoForm onAdd={handleAdd} />}

            {/* 본문 */}
            {loading && <Spinner />}

            {error && (
              <Card className="p-8 text-center">
                <p className="text-4xl mb-3">⚠️</p>
                <p className="text-slate-700 font-medium">데이터를 불러오지 못했습니다</p>
                <p className="text-sm text-slate-500 mt-1">{error}</p>
                <p className="text-xs text-slate-400 mt-3">
                  Express 서버가 <code className="bg-slate-100 px-1 rounded">/api/todos</code> 를 제공하는지 확인하세요
                </p>
              </Card>
            )}

            {!loading && !error && todos.length === 0 && (
              <Card className="p-12 text-center">
                <p className="text-4xl mb-3">🎉</p>
                <p className="text-slate-600">등록된 할 일이 없습니다</p>
              </Card>
            )}

            {!loading && !error && todos.length > 0 && (
              <div className="space-y-4">
                {todos.map((todo) => (
                  <TodoItem key={todo.id} todo={todo} onToggle={handleToggle} onDelete={handleDelete} />
                ))}
              </div>
            )}

            {/* 전체 완료 메시지 */}
            {!loading && !error && todos.length > 0 && completedCount === todos.length && (
              <p className="mt-6 text-center text-emerald-600 font-medium">
                모든 할 일을 완료했어요! 수고하셨습니다 🎊
              </p>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<TodoApp />);
  </script>
</body>
</html>
