        const onChange = () => { setPath(getHash()); window.scrollTo(0, 0); };
        window.addEventListener('hashchange', onChange);
        return () => window.removeEventListener('hashchange', onChange);
      }, []);
      const navigate = useCallback((to) => { window.location.hash = to; }, []);
      return <RouterContext.Provider value={{ path, navigate }}>{children}</RouterContext.Provider>;
    };

    const matchRoute = (pattern, path) => {
      const pp = pattern.split('/').filter(Boolean);
      const ap = path.split('/').filter(Boolean);
      if (pp.length !== ap.length) return null;
      const params = {};
      for (let i = 0; i < pp.length; i++) {
        if (pp[i].startsWith(':')) params[pp[i].slice(1)] = decodeURIComponent(ap[i]);
        else if (pp[i] !== ap[i]) return null;
      }
      return params;
    };

      const [cart, setCart] = useState(() => load('minssaem_cart', []));

      useEffect(() => { localStorage.setItem('minssaem_cart', JSON.stringify(cart)); }, [cart]);
      useEffect(() => { localStorage.setItem('minssaem_purchased', JSON.stringify(purchased)); }, [purchased]);

      const addToCart = useCallback((id) => {
        setCart(prev => prev.includes(id) ? prev : [...prev, id]);
      }, []);
      const removeFromCart = useCallback((id) => setCart(prev => prev.filter(x => x !== id)), []);
      const clearCart = useCallback(() => setCart([]), []);
      const purchase = useCallback((ids) => {
        setPurchased(prev => Array.from(new Set([...prev, ...ids])));
        setCart([]);
      }, []);

      const value = { cart, purchased, addToCart, removeFromCart, clearCart, purchase,
        inCart: (id) => cart.includes(id), isPurchased: (id) => purchased.includes(id) };

      const [open, setOpen] = useState(0);
      return (
        <div className="max-w-3xl mx-auto px-4 sm:px-6 py-14">
          <SectionTitle center eyebrow="FAQ" title="자주 묻는 질문"
            desc="궁금한 점을 먼저 확인해 보세요. 더 궁금한 점은 고객센터로 문의해 주세요." />
          <div className="mt-10 space-y-3">
            {FAQS.map((f, i) => (
              <Card key={i} className="overflow-hidden">
                <button className="w-full flex items-center justify-between gap-4 p-5 text-left hover:bg-ink-50 transition-colors" onClick={() => setOpen(open === i ? -1 : i)} aria-expanded={open === i}>
                  <span className="font-bold text-ink-900 flex items-start gap-3">
                    <span className="text-accent-600 font-extrabold">Q</span> {f.q}
                  </span>
                  <Icon name="chevron" className={`w-5 h-5 text-ink-400 shrink-0 transition-transform ${open === i ? 'rotate-180' : ''}`} />
                </button>
                {open === i && (
                  <div className="px-5 pb-5 pt-1 border-t border-ink-100">
                    <p className="text-ink-600 leading-relaxed pl-6">{f.a}</p>
                  </div>
                )}
              </Card>
            ))}
          </div>
          <Card className="mt-10 p-6 text-center bg-ink-50 border-ink-100">
            <p className="text-ink-600">더 궁금한 점이 있으신가요?</p>
            <p className="font-bold text-ink-900 mt-1">평일 10:00–18:00 · help@minssaem.co.kr</p>
          </Card>
        </div>
      );
    };

    // ========================================
    // 🧩 EmptyState / NotFound
    // ========================================
    const EmptyState = ({ icon, title, desc, to, cta }) => (
      <div className="max-w-md mx-auto px-4 py-24 text-center">
        <div className="w-20 h-20 mx-auto rounded-2xl bg-ink-100 text-ink-400 grid place-items-center mb-6"><Icon name={icon} className="w-10 h-10" /></div>
        <h1 className="text-xl font-extrabold text-ink-900">{title}</h1>
        <p className="mt-2 text-ink-500">{desc}</p>
        <div className="mt-8"><Button variant="primary" size="lg" as="a" href={'#' + to}>{cta} <Icon name="arrow" className="w-5 h-5" /></Button></div>
      </div>
    );

    const NotFound = () => (
      <EmptyState icon="globe" title="페이지를 찾을 수 없어요" desc="주소를 다시 확인해 주세요." to="/" cta="홈으로 가기" />
    );

    // ========================================
    // 🚀 App
    // ========================================
    const Routes = () => {
      const { path } = useRouter();
      if (path === '/') return <HomePage />;
      if (path === '/courses') return <CoursesPage />;
      const detail = matchRoute('/courses/:id', path);
      if (detail) return <CourseDetailPage id={detail.id} />;
      if (path === '/instructor') return <InstructorPage />;
      if (path === '/reviews') return <ReviewsPage />;
      if (path === '/cart') return <CartPage />;
      if (path === '/checkout') return <CheckoutPage />;
      if (path === '/my-courses') return <MyCoursesPage />;
      if (path === '/faq') return <FaqPage />;
      return <NotFound />;
    };

    const App = () => (
      <Router>
        <StoreProvider>
          <ToastProvider>
            <div className="min-h-screen flex flex-col">
              <Header />
              <main className="flex-1"><Routes /></main>
              <Footer />
            </div>
          </ToastProvider>
        </StoreProvider>
      </Router>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
