<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeSlideIn 0.25s ease-out; }

    /* 숫자 입력 화살표 제거 */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* 얇은 스크롤바 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
<div id="root"></div>
<script type="text/babel">
  const { useState, useMemo, useCallback } = React;

  const won  = (n) => `${Math.round(n).toLocaleString('ko-KR')}원`;
  const uid  = ()  => Math.random().toString(36).slice(2, 9);

  /* ── 인원별 색상 테마 (10가지) ─────────────────────── */
  const COLORS = [
    { dot: 'bg-rose-500',    bar: 'bg-rose-400',    light: 'bg-rose-50',    ring: 'ring-rose-300'    },
    { dot: 'bg-violet-500',  bar: 'bg-violet-400',  light: 'bg-violet-50',  ring: 'ring-violet-300'  },
    { dot: 'bg-amber-500',   bar: 'bg-amber-400',   light: 'bg-amber-50',   ring: 'ring-amber-300'   },
    { dot: 'bg-emerald-500', bar: 'bg-emerald-400', light: 'bg-emerald-50', ring: 'ring-emerald-300' },
    { dot: 'bg-cyan-500',    bar: 'bg-cyan-400',    light: 'bg-cyan-50',    ring: 'ring-cyan-300'    },
    { dot: 'bg-blue-500',    bar: 'bg-blue-400',    light: 'bg-blue-50',    ring: 'ring-blue-300'    },
    { dot: 'bg-pink-500',    bar: 'bg-pink-400',    light: 'bg-pink-50',    ring: 'ring-pink-300'    },
    { dot: 'bg-teal-500',    bar: 'bg-teal-400',    light: 'bg-teal-50',    ring: 'ring-teal-300'    },
    { dot: 'bg-orange-500',  bar: 'bg-orange-400',  light: 'bg-orange-50',  ring: 'ring-orange-300'  },
    { dot: 'bg-indigo-500',  bar: 'bg-indigo-400',  light: 'bg-indigo-50',  ring: 'ring-indigo-300'  },
  ];

  /* ── Avatar ────────────────────────────────────────── */
  function Avatar({ name, colorIdx, size = 'md' }) {
    const c = COLORS[colorIdx % COLORS.length];
    const sz = size === 'sm' ? 'w-7 h-7 text-xs' : 'w-9 h-9 text-sm';
    return (
      <div className={`${c.dot} ${sz} rounded-full flex items-center justify-center text-white font-bold shrink-0 select-none`}>
        {name ? name[0] : '?'}
      </div>
    );
  }

  /* ── 인원 카드 ─────────────────────────────────────── */
  function PersonCard({ person, colorIdx, canRemove, onChange, onRemove }) {
    const c = COLORS[colorIdx % COLORS.length];

    const addMenu    = () => onChange({ ...person, menus: [...person.menus, { id: uid(), name: '', price: '' }] });
    const updateMenu = (id, field, val) =>
      onChange({ ...person, menus: person.menus.map((m) => m.id === id ? { ...m, [field]: val } : m) });
    const removeMenu = (id) =>
      onChange({ ...person, menus: person.menus.filter((m) => m.id !== id) });

    const subtotal = person.menus.reduce((s, m) => s + (parseFloat(m.price) || 0), 0);

    return (
      <div className={`bg-white rounded-2xl border border-slate-200 overflow-hidden fade-in`}>
        {/* 헤더 */}
        <div className={`${c.light} px-4 py-3 flex items-center gap-3 border-b border-slate-100`}>
          <Avatar name={person.name} colorIdx={colorIdx} />
          <input
            value={person.name}
            onChange={(e) => onChange({ ...person, name: e.target.value })}
            placeholder={`인원 ${colorIdx + 1} 이름`}
            className="flex-1 min-w-0 bg-transparent text-slate-800 font-semibold text-sm placeholder-slate-400 outline-none"
          />
          <span className="text-sm font-bold text-slate-600 shrink-0">{won(subtotal)}</span>
          {canRemove && (
            <button
              onClick={() => onRemove(person.id)}
              aria-label="인원 삭제"
              className="text-slate-400 hover:text-rose-500 hover:bg-rose-50 p-1.5 rounded-lg transition-colors shrink-0"
            >
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          )}
        </div>

        {/* 메뉴 목록 */}
        <div className="px-4 pt-3 space-y-2">
          {person.menus.length === 0 && (
            <p className="text-center text-xs text-slate-400 py-2">메뉴를 추가해보세요</p>
          )}
          {person.menus.map((menu, mi) => (
            <div key={menu.id} className="flex items-center gap-2">
              <input
                value={menu.name}
                onChange={(e) => updateMenu(menu.id, 'name', e.target.value)}
                placeholder={`메뉴 ${mi + 1}`}
                className="flex-1 min-w-0 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white transition"
              />
              <div className="relative w-28 shrink-0">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none">₩</span>
                <input
                  type="number"
                  min="0"
                  value={menu.price}
                  onChange={(e) => updateMenu(menu.id, 'price', e.target.value)}
                  placeholder="0"
                  className="w-full rounded-xl border border-slate-200 bg-slate-50 pl-7 pr-2 py-2 text-sm text-right outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white transition"
                />
              </div>
              <button
                onClick={() => removeMenu(menu.id)}
                className="text-slate-300 hover:text-rose-400 p-1.5 rounded-lg hover:bg-rose-50 transition-colors shrink-0"
              >
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>
          ))}
        </div>

        {/* 메뉴 추가 버튼 */}
        <div className="px-4 py-3">
          <button
            onClick={addMenu}
            className="w-full rounded-xl border border-dashed border-slate-300 py-2 text-xs text-slate-500 font-medium hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all"
          >
            + 메뉴 추가
          </button>
        </div>
      </div>
    );
  }

  /* ── 할인 설정 패널 ────────────────────────────────── */
  function DiscountPanel({ discount, people, onChange }) {
    const set = (patch) => onChange({ ...discount, ...patch });
    const isActive = parseFloat(discount.value) > 0;

    return (
      <div className="bg-white rounded-2xl border border-slate-200 p-4">
        <div className="flex items-center gap-2 mb-3">
          <span className="text-base">🏷️</span>
          <h2 className="font-bold text-slate-800 text-sm">할인 설정</h2>
          {isActive && (
            <span className="ml-auto text-xs font-semibold bg-rose-100 text-rose-600 px-2 py-0.5 rounded-full">적용 중</span>
          )}
        </div>

        {/* 할인 방식 토글 */}
        <div className="flex bg-slate-100 rounded-xl p-1 mb-3">
          {[{ key: 'amount', label: '금액 할인 (₩)' }, { key: 'percent', label: '비율 할인 (%)' }].map(({ key, label }) => (
            <button
              key={key}
              onClick={() => set({ type: key })}
              className={`flex-1 rounded-lg py-1.5 text-xs font-semibold transition-all ${
                discount.type === key
                  ? 'bg-white text-indigo-700 shadow-sm'
                  : 'text-slate-500 hover:text-slate-700'
              }`}
            >
              {label}
            </button>
          ))}
        </div>

        {/* 할인 값 입력 */}
        <div className="relative mb-3">
          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none font-medium">
            {discount.type === 'amount' ? '₩' : '%'}
          </span>
          <input
            type="number"
            min="0"
            max={discount.type === 'percent' ? 100 : undefined}
            value={discount.value}
            onChange={(e) => set({ value: e.target.value })}
            placeholder={discount.type === 'amount' ? '10000' : '10'}
            className="w-full rounded-xl border border-slate-200 bg-slate-50 pl-9 pr-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white transition"
          />
        </div>

        {/* 할인 대상 */}
        <div>
          <label className="block text-xs font-semibold text-slate-500 mb-1.5 tracking-wide">할인 대상</label>
          <div className="relative">
            <select
              value={discount.target}
              onChange={(e) => set({ target: e.target.value })}
              className="w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white transition pr-8"
            >
              <option value="all">👥 전체에게 균등 적용</option>
              {people.map((p, i) => (
                <option key={p.id} value={p.id}>
                  {p.name || `인원 ${i + 1}`}에게만 적용
                </option>
              ))}
            </select>
            <svg className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
          <p className="text-xs text-slate-400 mt-1.5">
            {discount.target === 'all'
              ? '할인 금액이 인원수만큼 나뉘어 모두에게 적용됩니다.'
              : '선택한 한 사람에게만 할인이 적용됩니다.'}
          </p>
        </div>
      </div>
    );
  }

  /* ── 계산 결과 ─────────────────────────────────────── */
  function Results({ results, totals }) {
    const [copied, setCopied] = useState(false);

    const maxFinal = Math.max(...results.map((r) => r.final), 1);

    const handleCopy = () => {
      const lines = [
        '💰 더치페이 계산 결과',
        '─────────────────────',
        ...results.map((r) =>
          `${r.name}: ${won(r.final)}${r.discount > 0 ? ` (할인 −${won(r.discount)})` : ''}`
        ),
        '─────────────────────',
        `총 결제액: ${won(totals.net)}`,
      ];
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      });
    };

    return (
      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden fade-in">
        {/* 결과 헤더 */}
        <div className="px-4 pt-4 pb-3 flex items-center justify-between border-b border-slate-100">
          <div className="flex items-center gap-2">
            <span className="text-base">🧮</span>
            <h2 className="font-bold text-slate-800 text-sm">계산 결과</h2>
          </div>
          <button
            onClick={handleCopy}
            className={`flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-lg transition-all ${
              copied
                ? 'bg-emerald-100 text-emerald-700'
                : 'bg-slate-100 text-slate-600 hover:bg-indigo-100 hover:text-indigo-700'
            }`}
          >
            {copied ? '✓ 복사됨!' : '결과 복사'}
          </button>
        </div>

        {/* 인원별 결과 */}
        <div className="p-4 space-y-4">
          {results.map((r) => {
            const pct = maxFinal > 0 ? (r.final / maxFinal) * 100 : 0;
            const c   = COLORS[r.colorIdx % COLORS.length];
            return (
              <div key={r.id}>
                <div className="flex items-center justify-between mb-1.5">
                  <div className="flex items-center gap-2">
                    <Avatar name={r.name} colorIdx={r.colorIdx} size="sm" />
                    <span className="text-sm font-semibold text-slate-700">{r.name}</span>
                    {r.isMax && <span className="text-xs bg-rose-100 text-rose-600 font-semibold px-1.5 py-0.5 rounded-full">최다 💸</span>}
                    {r.isMin && <span className="text-xs bg-emerald-100 text-emerald-600 font-semibold px-1.5 py-0.5 rounded-full">최소 ✨</span>}
                  </div>
                  <div className="text-right">
                    <p className="text-base font-bold text-slate-800">{won(r.final)}</p>
                    {r.discount > 0 && (
                      <p className="text-xs text-rose-400 leading-tight">−{won(r.discount)} 할인</p>
                    )}
                  </div>
                </div>
                {/* 진행 바 */}
                <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
                  <div
                    className={`h-full rounded-full transition-all duration-500 ${c.bar}`}
                    style={{ width: `${pct}%` }}
                  />
                </div>
              </div>
            );
          })}
        </div>

        {/* 합계 요약 */}
        <div className="bg-slate-50 border-t border-slate-100 px-4 py-3 space-y-1">
          <div className="flex justify-between text-xs text-slate-500">
            <span>주문 총액</span>
            <span>{won(totals.gross)}</span>
          </div>
          {totals.discount > 0 && (
            <div className="flex justify-between text-xs text-rose-500">
              <span>총 할인</span>
              <span>−{won(totals.discount)}</span>
            </div>
          )}
          <div className="flex justify-between font-bold text-slate-800 pt-1">
            <span>최종 결제 총액</span>
            <span className="text-indigo-700 text-lg">{won(totals.net)}</span>
          </div>
        </div>
      </div>
    );
  }

  /* ── App ───────────────────────────────────────────── */
  function App() {
    const makePerson = () => ({ id: uid(), name: '', menus: [{ id: uid(), name: '', price: '' }] });

    const [people,   setPeople]   = useState([makePerson(), makePerson()]);
    const [discount, setDiscount] = useState({ type: 'amount', value: '', target: 'all' });

    const addPerson    = () => setPeople((p) => p.length < 10 ? [...p, makePerson()] : p);
    const updatePerson = useCallback((updated) =>
      setPeople((prev) => prev.map((p) => p.id === updated.id ? updated : p)), []);
    const removePerson = useCallback((id) => {
      setPeople((prev) => prev.length <= 2 ? prev : prev.filter((p) => p.id !== id));
      setDiscount((d) => d.target === id ? { ...d, target: 'all' } : d);
    }, []);

    /* 계산 로직 */
    const { results, totals } = useMemo(() => {
      const dValue = parseFloat(discount.value) || 0;

      const base = people.map((p, i) => {
        const subtotal = p.menus.reduce((s, m) => s + (parseFloat(m.price) || 0), 0);
        return { id: p.id, name: p.name || `인원 ${i + 1}`, subtotal, discount: 0, colorIdx: i };
      });

      const grossTotal = base.reduce((s, b) => s + b.subtotal, 0);

      for (const b of base) {
        let d = 0;
        if (discount.target === 'all') {
          d = discount.type === 'percent'
            ? b.subtotal * (dValue / 100)
            : people.length > 0 ? dValue / people.length : 0;
        } else if (discount.target === b.id) {
          d = discount.type === 'percent' ? b.subtotal * (dValue / 100) : dValue;
        }
        b.discount = Math.min(d, b.subtotal);
      }

      const withFinal = base.map((b) => ({ ...b, final: b.subtotal - b.discount }));
      const finals    = withFinal.filter((b) => b.final > 0).map((b) => b.final);
      const maxVal    = finals.length ? Math.max(...finals) : -1;
      const minVal    = finals.length ? Math.min(...finals) : -1;

      const results = withFinal.map((b) => ({
        ...b,
        isMax: b.final === maxVal && maxVal !== minVal,
        isMin: b.final === minVal && maxVal !== minVal,
      }));

      const totalDiscount = base.reduce((s, b) => s + b.discount, 0);
      return { results, totals: { gross: grossTotal, discount: totalDiscount, net: grossTotal - totalDiscount } };
    }, [people, discount]);

    const hasAnyPrice = people.some((p) => p.menus.some((m) => parseFloat(m.price) > 0));

    return (
      <div className="min-h-screen bg-slate-100">
        {/* 그라디언트 헤더 */}
        <div className="bg-gradient-to-br from-indigo-600 to-violet-600 px-4 pt-10 pb-12">
          <div className="max-w-lg mx-auto text-center">
            <div className="text-5xl mb-3">💰</div>
            <h1 className="text-2xl font-extrabold text-white tracking-tight">더치페이 계산기</h1>
            <p className="text-indigo-200 text-sm mt-1">메뉴별로 공평하게 정산해요</p>
          </div>
        </div>

        {/* 컨텐츠 */}
        <div className="max-w-lg mx-auto px-4 -mt-6 pb-12 space-y-3">

          {/* ── 인원 섹션 ── */}
          <div className="bg-white rounded-2xl border border-slate-200 p-4">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <span className="text-base">👥</span>
                <h2 className="font-bold text-slate-800 text-sm">인원</h2>
                <span className="bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded-full">
                  {people.length}명
                </span>
              </div>
              <button
                onClick={addPerson}
                disabled={people.length >= 10}
                className="text-xs font-semibold text-indigo-600 hover:text-white hover:bg-indigo-600 disabled:opacity-40 disabled:cursor-not-allowed px-3 py-1.5 rounded-lg border border-indigo-200 hover:border-indigo-600 transition-all"
              >
                + 인원 추가
              </button>
            </div>

            <div className="space-y-3">
              {people.map((person, idx) => (
                <PersonCard
                  key={person.id}
                  person={person}
                  colorIdx={idx}
                  canRemove={people.length > 2}
                  onChange={updatePerson}
                  onRemove={removePerson}
                />
              ))}
            </div>

            {people.length < 10 && (
              <button
                onClick={addPerson}
                className="mt-3 w-full rounded-xl border border-dashed border-slate-300 py-2.5 text-xs text-slate-400 font-medium hover:border-indigo-400 hover:text-indigo-500 hover:bg-indigo-50 transition-all"
              >
                + 여기를 눌러 인원을 추가하세요 (최대 10명)
              </button>
            )}
          </div>

          {/* ── 할인 설정 ── */}
          <DiscountPanel discount={discount} people={people} onChange={setDiscount} />

          {/* ── 계산 결과 ── */}
          {hasAnyPrice ? (
            <Results results={results} totals={totals} />
          ) : (
            <div className="bg-white rounded-2xl border border-dashed border-slate-300 py-10 text-center fade-in">
              <div className="text-3xl mb-2">🍽️</div>
              <p className="text-sm text-slate-400 font-medium">메뉴 가격을 입력하면</p>
              <p className="text-sm text-slate-400">계산 결과가 여기에 나타나요</p>
            </div>
          )}

          <p className="text-center text-xs text-slate-400 pt-2">Week 2 Homework · React + Tailwind</p>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
