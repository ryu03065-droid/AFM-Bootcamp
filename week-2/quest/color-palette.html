<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>컬러 팔레트 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    .toast-anim { animation: toastIn 0.25s ease-out; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ========================================
    // 🎨 Color Math (pure JS, no libraries)
    // ========================================

    // Normalize / validate a hex string -> "#RRGGBB" or null
    function normalizeHex(input) {
      if (!input) return null;
      let h = input.trim().replace(/^#/, '');
      if (/^[0-9a-fA-F]{3}$/.test(h)) {
        h = h.split('').map(c => c + c).join('');
      }
      if (/^[0-9a-fA-F]{6}$/.test(h)) {
        return '#' + h.toUpperCase();
      }
      return null;
    }

    function hexToRgb(hex) {
      const h = hex.replace(/^#/, '');
      return {
        r: parseInt(h.slice(0, 2), 16),
        g: parseInt(h.slice(2, 4), 16),
        b: parseInt(h.slice(4, 6), 16),
      };
    }

    function rgbToHex(r, g, b) {
      const c = (v) => {
        const n = Math.max(0, Math.min(255, Math.round(v)));
        return n.toString(16).padStart(2, '0');
      };
      return ('#' + c(r) + c(g) + c(b)).toUpperCase();
    }

    // HEX -> HSL  (h: 0-360, s/l: 0-100)
    function hexToHsl(hex) {
      let { r, g, b } = hexToRgb(hex);
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let h = 0, s = 0;
      const l = (max + min) / 2;
      const d = max - min;
      if (d !== 0) {
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return { h: h * 360, s: s * 100, l: l * 100 };
    }

    // HSL -> HEX
    function hslToHex(h, s, l) {
      h = ((h % 360) + 360) % 360;
      s = Math.max(0, Math.min(100, s)) / 100;
      l = Math.max(0, Math.min(100, l)) / 100;
      const c = (1 - Math.abs(2 * l - 1)) * s;
      const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
      const m = l - c / 2;
      let r = 0, g = 0, b = 0;
      if (h < 60)       { r = c; g = x; b = 0; }
      else if (h < 120) { r = x; g = c; b = 0; }
      else if (h < 180) { r = 0; g = c; b = x; }
      else if (h < 240) { r = 0; g = x; b = c; }
      else if (h < 300) { r = x; g = 0; b = c; }
      else              { r = c; g = 0; b = x; }
      return rgbToHex((r + m) * 255, (g + m) * 255, (b + m) * 255);
    }

    // Build the 11-swatch palette: 5 lighter -> base -> 5 darker
    function buildPalette(hex) {
      const { h, s, l } = hexToHsl(hex);
      const lighter = [40, 32, 24, 16, 8].map((d) => ({
        hex: hslToHex(h, s, Math.min(95, l + d)),
        label: 'L+' + d,
      }));
      const darker = [8, 16, 24, 32, 40].map((d) => ({
        hex: hslToHex(h, s, Math.max(5, l - d)),
        label: 'D-' + d,
      }));
      const base = { hex: normalizeHex(hex), label: 'Base' };
      return [...lighter, base, ...darker];
    }

    // Pick readable text color (black/white) for a given background hex
    function readableText(hex) {
      const { r, g, b } = hexToRgb(hex);
      // relative luminance
      const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return lum > 0.6 ? '#1e293b' : '#ffffff';
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ children, variant = 'primary', size = 'md', className = '', ...props }) {
      const variants = {
        primary: 'bg-slate-900 text-white hover:bg-slate-700',
        secondary: 'bg-white text-slate-700 border border-slate-300 hover:bg-slate-50',
        ghost: 'bg-transparent text-slate-600 hover:bg-slate-100',
      };
      const sizes = {
        sm: 'px-2.5 py-1 text-xs',
        md: 'px-4 py-2 text-sm',
        lg: 'px-5 py-2.5 text-base',
      };
      return (
        <button
          className={`inline-flex items-center justify-center gap-1.5 rounded-lg font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-slate-400 ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    function CopyIcon({ className = 'w-4 h-4' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      );
    }

    // ========================================
    // 🧩 Toast
    // ========================================

    function Toast({ message }) {
      if (!message) return null;
      return (
        <div
          role="status"
          aria-live="polite"
          className="toast-anim fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 rounded-full bg-slate-900 px-5 py-3 text-sm font-medium text-white shadow-lg"
        >
          <svg className="w-4 h-4 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          {message}
        </div>
      );
    }

    // ========================================
    // 🧩 Swatch Card
    // ========================================

    function SwatchCard({ item, onCopy }) {
      const txt = readableText(item.hex);
      return (
        <div className="rounded-xl border border-slate-200 bg-white shadow-sm overflow-hidden transition-transform hover:-translate-y-0.5 hover:shadow-md">
          <button
            onClick={() => onCopy(item.hex)}
            className="block w-full h-24 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-slate-400"
            style={{ backgroundColor: item.hex }}
            title="클릭하여 복사"
            aria-label={`${item.hex} 복사`}
          >
            <span
              className="text-xs font-semibold px-2 py-1 rounded bg-black/10"
              style={{ color: txt }}
            >
              {item.label}
            </span>
          </button>
          <div className="flex items-center justify-between px-3 py-2.5">
            <span className="font-mono text-sm text-slate-700">{item.hex}</span>
            <Button variant="ghost" size="sm" onClick={() => onCopy(item.hex)} aria-label={`${item.hex} 복사`}>
              <CopyIcon className="w-3.5 h-3.5" />
              복사
            </Button>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Color Palette Generator Page
    // ========================================

    function ColorPaletteGenerator() {
      const [hex, setHex] = useState('#3B82F6');     // canonical valid color
      const [text, setText] = useState('#3B82F6');   // raw text input
      const [toast, setToast] = useState('');

      const palette = useMemo(() => buildPalette(hex), [hex]);
      const isValid = normalizeHex(text) !== null;

      // text input -> update canonical color if valid
      const onTextChange = (e) => {
        const val = e.target.value;
        setText(val);
        const norm = normalizeHex(val);
        if (norm) setHex(norm);
      };

      // color picker -> sync both
      const onPickerChange = (e) => {
        const norm = normalizeHex(e.target.value);
        if (norm) {
          setHex(norm);
          setText(norm);
        }
      };

      const showToast = useCallback((msg) => setToast(msg), []);

      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(''), 1800);
        return () => clearTimeout(t);
      }, [toast]);

      const copyColor = useCallback(async (value) => {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(value);
          } else {
            // fallback for file:// / non-secure contexts
            const ta = document.createElement('textarea');
            ta.value = value;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          showToast(`${value} 복사됨!`);
        } catch (err) {
          showToast('복사에 실패했어요');
        }
      }, [showToast]);

      return (
        <div className="min-h-screen px-4 py-10 sm:px-6 lg:px-8">
          <div className="mx-auto max-w-5xl">

            {/* Header */}
            <header className="text-center mb-10">
              <h1 className="text-3xl sm:text-4xl font-bold text-slate-900">
                컬러 팔레트 생성기
              </h1>
              <p className="mt-2 text-base sm:text-lg text-slate-500">
                같은 정보, 다른 형태
              </p>
            </header>

            {/* Controls */}
            <section className="rounded-2xl border border-slate-200 bg-white p-5 sm:p-6 shadow-sm mb-8">
              <div className="flex flex-col sm:flex-row sm:items-end gap-4">
                <div className="flex-1">
                  <label htmlFor="hex-input" className="block text-sm font-medium text-slate-700 mb-1.5">
                    HEX 코드
                  </label>
                  <div className="flex items-center gap-2">
                    <span className="font-mono text-slate-400 text-lg select-none">#</span>
                    <input
                      id="hex-input"
                      type="text"
                      value={text.replace(/^#/, '')}
                      onChange={(e) => onTextChange({ target: { value: '#' + e.target.value } })}
                      placeholder="3B82F6"
                      maxLength={6}
                      spellCheck={false}
                      className={`w-full rounded-lg border px-3 py-2 font-mono text-base uppercase tracking-wide focus:outline-none focus:ring-2 ${
                        isValid
                          ? 'border-slate-300 focus:ring-slate-400'
                          : 'border-red-400 focus:ring-red-400'
                      }`}
                    />
                  </div>
                  {!isValid && (
                    <p className="mt-1.5 text-xs text-red-500">올바른 HEX 값을 입력하세요 (예: 3B82F6)</p>
                  )}
                </div>

                <div>
                  <label htmlFor="color-picker" className="block text-sm font-medium text-slate-700 mb-1.5">
                    컬러 피커
                  </label>
                  <input
                    id="color-picker"
                    type="color"
                    value={hex}
                    onChange={onPickerChange}
                    className="h-11 w-20 cursor-pointer rounded-lg border border-slate-300 bg-white p-1"
                    aria-label="색상 선택기"
                  />
                </div>
              </div>
            </section>

            {/* Gradient Strip */}
            <section className="mb-10" aria-label="팔레트 그라데이션 스트립">
              <div className="flex h-44 w-full overflow-hidden rounded-2xl shadow-sm ring-1 ring-slate-200">
                {palette.map((item, i) => {
                  const txt = readableText(item.hex);
                  const isBase = item.label === 'Base';
                  return (
                    <button
                      key={i}
                      onClick={() => copyColor(item.hex)}
                      className="group relative flex-1 flex flex-col items-center justify-end pb-3 transition-all focus:outline-none focus:z-10 focus:ring-2 focus:ring-inset focus:ring-white"
                      style={{ backgroundColor: item.hex }}
                      title={`${item.hex} · 클릭하여 복사`}
                      aria-label={`${item.hex} 복사`}
                    >
                      {isBase && (
                        <span
                          className="absolute top-2 left-1/2 -translate-x-1/2 text-[10px] font-bold uppercase tracking-widest opacity-80"
                          style={{ color: txt }}
                        >
                          Base
                        </span>
                      )}
                      <span
                        className="font-mono text-[10px] sm:text-xs opacity-0 group-hover:opacity-100 transition-opacity"
                        style={{ color: txt }}
                      >
                        {item.hex}
                      </span>
                    </button>
                  );
                })}
              </div>
            </section>

            {/* Cards Grid */}
            <section>
              <h2 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">
                팔레트 ({palette.length}개)
              </h2>
              <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 sm:gap-4">
                {palette.map((item, i) => (
                  <SwatchCard key={i} item={item} onCopy={copyColor} />
                ))}
              </div>
            </section>

            <footer className="mt-12 text-center text-xs text-slate-400">
              스와치를 클릭하거나 복사 버튼을 눌러 HEX 코드를 복사하세요.
            </footer>
          </div>

          <Toast message={toast} />
        </div>
      );
    }

    // ========================================
    // 🚀 App + Render
    // ========================================

    function App() {
      return <ColorPaletteGenerator />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
