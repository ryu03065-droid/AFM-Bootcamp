<meta charset="UTF-8" />
<title>수업 Q&A 봇</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #f4f1ea;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 640px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    height: 88vh;
    overflow: hidden;
  }
  header {
    padding: 18px 20px;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-size: 17px;
    margin: 0;
  }
  header p {
    margin: 2px 0 0;
    font-size: 12px;
    color: #888;
  }
  #resetBtn {
    border: none;
    background: #f0eee6;
    color: #666;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
  }
  #resetBtn:hover { background: #e5e2d8; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: #4a3f35;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: #f0eee6;
    color: #333;
    border-bottom-left-radius: 4px;
  }
  .msg.bot.loading { color: #999; font-style: italic; }
  form {
    display: flex;
    gap: 8px;
    padding: 16px;
    border-top: 1px solid #eee;
  }
  input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: 1px solid #ddd;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: #4a3f35; }
  button[type="submit"] {
    border: none;
    background: #4a3f35;
    color: #fff;
    padding: 0 18px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }
  button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<div class="app">
  <header>
    <div>
      <h1>🎓 수업 Q&A 봇</h1>
      <p>강의 노트 + 실습 코드를 기억하고 답변해요</p>
    </div>
    <button id="resetBtn" type="button">대화 초기화</button>
  </header>
  <div id="messages"></div>
  <form id="askForm">
    <input id="question" type="text" placeholder="수업 내용에 대해 물어보세요 (예: git commit이 뭐야?)" autocomplete="off" />
    <button type="submit">전송</button>
  </form>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const formEl = document.getElementById('askForm');
  const inputEl = document.getElementById('question');
  const resetBtn = document.getElementById('resetBtn');

  const SESSION_KEY = 'class-qna-bot-session-id';
  let sessionId = localStorage.getItem(SESSION_KEY);

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  addMessage('안녕하세요! 강의 노트와 실습 코드를 바탕으로 수업 내용에 대해 답변해드려요. 무엇이든 물어보세요 🙌', 'bot');

  formEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = inputEl.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    inputEl.value = '';
    inputEl.disabled = true;
    formEl.querySelector('button').disabled = true;

    const loadingEl = addMessage('답변 작성 중...', 'bot loading');

    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, sessionId }),
      });
      const data = await res.json();

      if (data.sessionId) {
        sessionId = data.sessionId;
        localStorage.setItem(SESSION_KEY, sessionId);
      }

      loadingEl.remove();
      if (data.error) {
        addMessage(`⚠️ ${data.error}`, 'bot');
      } else {
        addMessage(data.answer, 'bot');
      }
    } catch (err) {
      loadingEl.remove();
      addMessage('⚠️ 서버와 통신 중 오류가 발생했습니다.', 'bot');
    } finally {
      inputEl.disabled = false;
      formEl.querySelector('button').disabled = false;
      inputEl.focus();
    }
  });

  resetBtn.addEventListener('click', async () => {
    if (sessionId) {
      await fetch('/api/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId }),
      });
    }
    localStorage.removeItem(SESSION_KEY);
    sessionId = null;
    messagesEl.innerHTML = '';
    addMessage('대화 기록을 초기화했어요. 새로 질문해주세요!', 'bot');
  });
</script>
