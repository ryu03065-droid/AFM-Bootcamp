<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Amy — 개인 Q&A 봇</title>

  <!-- ⚠️ 모든 CDN 버전 고정. Babel 은 7.x 고정 (8.x 미지원). -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0d0d0f;
      --sidebar: #111114;
      --chat: #16161a;
      --input: #1e1e24;
      --accent: #8b5cf6;
    }
    html, body { background: var(--bg); height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100vh; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp { animation: fadeInUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }

    @keyframes bounceDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .typing-dot { animation: bounceDot 1.2s infinite ease-in-out both; }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .online-dot { animation: pulseDot 2s infinite ease-in-out; }

    /* 커스텀 스크롤바 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a42; }

    textarea { scrollbar-width: thin; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useRef, useEffect, useCallback } = React;

    // ========================================
    // API 설정
    // ========================================
    const API_BASE_URL = '/api';

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // 간단한 마크다운 렌더러 (**굵게**, 줄바꿈, 글머리 기호)
    function renderMarkdown(text) {
      const lines = String(text).split('\n');
      const elements = [];
      lines.forEach((line, i) => {
        // **굵게** 처리
        const parts = line.split(/(\*\*[^*]+\*\*)/g).filter(Boolean);
        const rendered = parts.map((part, j) => {
          if (/^\*\*[^*]+\*\*$/.test(part)) {
            return <strong key={j} className="font-semibold text-white">{part.slice(2, -2)}</strong>;
          }
          return <React.Fragment key={j}>{part}</React.Fragment>;
        });
        const isBullet = /^\s*[-•]\s+/.test(line);
        if (line.trim() === '') {
          elements.push(<div key={i} className="h-2" />);
          return;
        }
        elements.push(
          <p
            key={i}
            className={isBullet ? 'pl-4 relative leading-relaxed' : 'leading-relaxed'}
          >
            {isBullet && <span className="absolute left-0 text-violet-400">•</span>}
            {isBullet
              ? rendered.map((r, k) => (typeof r === 'object' && r.props && typeof r.props.children === 'string')
                  ? <React.Fragment key={k}>{r.props.children.replace(/^\s*[-•]\s+/, '')}</React.Fragment>
                  : r)
              : rendered}
          </p>
        );
      });
      return <div className="space-y-1">{elements}</div>;
    }

    function Avatar({ size = 'md', className = '' }) {
      const sizes = {
        xs: 'w-8 h-8 text-base',
        sm: 'w-9 h-9 text-base',
        md: 'w-14 h-14 text-2xl',
        lg: 'w-20 h-20 text-4xl',
      };
      return (
        <div className={`${sizes[size]} ${className} rounded-full grid place-items-center
          bg-gradient-to-br from-violet-500 to-indigo-600 text-white font-bold
          shadow-lg shadow-violet-900/40 ring-2 ring-white/10 select-none`}>
          🙋‍♀️
        </div>
      );
    }

    function TypingIndicator() {
      return (
        <div className="flex items-center gap-1.5 px-1 py-1">
          {[0, 1, 2].map(i => (
            <span
              key={i}
              className="typing-dot w-2 h-2 rounded-full bg-violet-400"
              style={{ animationDelay: `${i * 0.16}s` }}
            />
          ))}
        </div>
      );
    }

    // 전송 아이콘 (paper plane)
    function SendIcon({ className = '' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M22 2 11 13" />
          <path d="M22 2 15 22l-4-9-9-4 20-7z" />
        </svg>
      );
    }

    function MenuIcon({ className = '' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      );
    }

    function CloseIcon({ className = '' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      );
    }

    // ========================================
    // 🧩 Chat Bubble Components
    // ========================================

    function QuestionBubble({ text }) {
      return (
        <div className="flex justify-end animate-fadeInUp">
          <div className="max-w-[85%] sm:max-w-[75%] px-4 py-3 rounded-2xl rounded-br-md
            bg-gradient-to-br from-violet-600 to-indigo-600 text-white text-[15px]
            leading-relaxed shadow-md shadow-violet-900/30 whitespace-pre-wrap break-words">
            {text}
          </div>
        </div>
      );
    }

    function AnswerBubble({ children, loading }) {
      return (
        <div className="flex justify-start gap-3 animate-fadeInUp">
          <Avatar size="sm" className="mt-0.5 shrink-0" />
          <div className="max-w-[85%] sm:max-w-[75%] px-4 py-3 rounded-2xl rounded-bl-md
            bg-[#1e1e2a] border border-white/5 text-zinc-200 text-[15px]
            shadow-md shadow-black/30 break-words">
            {loading ? <TypingIndicator /> : children}
          </div>
        </div>
      );
    }

    function ErrorBubble({ text }) {
      return (
        <div className="flex justify-start gap-3 animate-fadeInUp">
          <Avatar size="sm" className="mt-0.5 shrink-0" />
          <div className="max-w-[85%] sm:max-w-[75%] px-4 py-3 rounded-2xl rounded-bl-md
            bg-red-950/40 border border-red-500/30 text-red-300 text-[15px] break-words">
            {text}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Sidebar
    // ========================================
    const SUGGESTIONS = ['무슨 일 해?', '어떤 툴 써?', '요즘 뭐 배워?', '취미가 뭐야?', '연락처가 어떻게 돼?'];

    function Sidebar({ onAsk, disabled, mobileOpen, onClose }) {
      return (
        <>
          {/* 모바일 오버레이 */}
          {mobileOpen && (
            <div
              onClick={onClose}
              className="fixed inset-0 bg-black/60 z-30 md:hidden"
              aria-hidden="true"
            />
          )}

          <aside className={`
            fixed md:static top-0 left-0 z-40 h-full w-[290px] shrink-0
            bg-[#111114] border-r border-white/5 flex flex-col
            transition-transform duration-300 ease-out
            ${mobileOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0
          `}>
            {/* 모바일 닫기 버튼 */}
            <button
              onClick={onClose}
              aria-label="사이드바 닫기"
              className="md:hidden absolute top-4 right-4 p-1.5 rounded-lg
                text-zinc-400 hover:text-white hover:bg-white/10 transition-colors">
              <CloseIcon className="w-5 h-5" />
            </button>

            {/* 프로필 카드 */}
            <div className="p-6 border-b border-white/5">
              <div className="flex flex-col items-center text-center">
                <Avatar size="lg" className="mb-4" />
                <h2 className="text-xl font-bold text-white">Amy</h2>
                <p className="mt-1 text-sm text-violet-300 font-medium">
                  Product Designer
                </p>
                <p className="text-xs text-zinc-500 mt-0.5">@ NEW ID</p>
              </div>
            </div>

            {/* 추천 질문 */}
            <div className="flex-1 overflow-y-auto p-5">
              <p className="text-xs font-semibold uppercase tracking-wider text-zinc-500 mb-3 px-1">
                추천 질문
              </p>
              <div className="space-y-2">
                {SUGGESTIONS.map(s => (
                  <button
                    key={s}
                    type="button"
                    onClick={() => onAsk(s)}
                    disabled={disabled}
                    className="w-full text-left px-4 py-3 rounded-xl text-sm font-medium
                      bg-white/[0.03] border border-white/5 text-zinc-300
                      hover:bg-violet-500/15 hover:border-violet-400/40 hover:text-white
                      active:scale-[0.98]
                      transition-all duration-200
                      disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-white/[0.03]
                      disabled:hover:border-white/5 flex items-center gap-2.5">
                    <span className="text-violet-400">💬</span>
                    {s}
                  </button>
                ))}
              </div>
            </div>

            {/* 앱 설명 */}
            <div className="p-5 border-t border-white/5">
              <p className="text-xs leading-relaxed text-zinc-500">
                Amy를 대신해 답해주는 AI Q&A 봇이에요. 답변은 Amy의{' '}
                <span className="text-zinc-400">about-me.md</span> 내용만 근거로 생성됩니다.
              </p>
            </div>
          </aside>
        </>
      );
    }

    // ========================================
    // 🧩 Chat Header
    // ========================================
    function ChatHeader({ onMenu }) {
      return (
        <header className="flex items-center gap-3 px-4 sm:px-6 py-3.5
          border-b border-white/5 bg-[#16161a]/80 backdrop-blur-md shrink-0">
          {/* 모바일 메뉴 버튼 */}
          <button
            onClick={onMenu}
            aria-label="메뉴 열기"
            className="md:hidden p-1.5 rounded-lg text-zinc-400 hover:text-white
              hover:bg-white/10 transition-colors">
            <MenuIcon className="w-5 h-5" />
          </button>

          <Avatar size="xs" className="shrink-0" />
          <div className="min-w-0">
            <p className="text-[15px] font-semibold text-white leading-tight">Amy</p>
            <p className="flex items-center gap-1.5 text-xs text-zinc-400">
              <span className="online-dot w-1.5 h-1.5 rounded-full bg-green-400 inline-block" />
              온라인
            </p>
          </div>
        </header>
      );
    }

    // ========================================
    // 🧩 Chat Input
    // ========================================
    function ChatInput({ value, onChange, onSend, disabled, inputRef }) {
      // 멀티라인 높이 자동 조절
      useEffect(() => {
        const el = inputRef.current;
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
      }, [value]);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          onSend();
        }
      };

      return (
        <div className="px-4 sm:px-6 py-4 bg-[#16161a] shrink-0">
          <div className="max-w-3xl mx-auto">
            <div className="flex items-end gap-2 p-2 rounded-2xl
              bg-[#1e1e24] border border-white/10 shadow-xl shadow-black/40
              focus-within:border-violet-400/50 transition-colors">
              <textarea
                ref={inputRef}
                rows={1}
                value={value}
                onChange={(e) => onChange(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="Amy에게 메시지 보내기…"
                aria-label="질문 입력"
                autoFocus
                className="flex-1 bg-transparent px-3 py-2 text-[15px] text-white resize-none
                  placeholder:text-zinc-500 focus:outline-none leading-relaxed
                  max-h-40 overflow-y-auto"
              />
              <button
                type="button"
                onClick={onSend}
                disabled={disabled || !value.trim()}
                aria-label="질문 전송"
                className="shrink-0 w-10 h-10 grid place-items-center rounded-xl
                  bg-violet-600 hover:bg-violet-500 active:scale-90 text-white
                  disabled:bg-zinc-700 disabled:text-zinc-500 disabled:cursor-not-allowed
                  disabled:active:scale-100 transition-all duration-150">
                <SendIcon className="w-5 h-5" />
              </button>
            </div>
            <p className="text-center text-[11px] text-zinc-600 mt-2.5">
              Enter 전송 · Shift + Enter 줄바꿈
            </p>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [input, setInput] = useState('');
      const [messages, setMessages] = useState([]); // { role: 'q'|'a'|'error', text }
      const [loading, setLoading] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const scrollRef = useRef(null);
      const inputRef = useRef(null);

      // 새 메시지 추가 시 자동 스크롤
      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
        }
      }, [messages, loading]);

      const ask = useCallback(async (question) => {
        const q = question.trim();
        if (!q || loading) return;

        setSidebarOpen(false);
        setMessages(prev => [...prev, { role: 'q', text: q }]);
        setInput('');
        setLoading(true);

        try {
          const res = await fetch(`${API_BASE_URL}/ask`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q }),
          });
          if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
          const data = await res.json();
          setMessages(prev => [...prev, { role: 'a', text: data.answer ?? '답변을 받지 못했어요.' }]);
        } catch (err) {
          setMessages(prev => [...prev, {
            role: 'error',
            text: `답변을 가져오지 못했어요. ${err.message || ''} 서버가 실행 중인지 확인해 주세요.`,
          }]);
        } finally {
          setLoading(false);
          inputRef.current && inputRef.current.focus();
        }
      }, [loading]);

      const handleSend = () => ask(input);

      const hasChat = messages.length > 0;

      return (
        <div className="flex h-full bg-[#0d0d0f] text-white overflow-hidden">

          {/* ===== 사이드바 ===== */}
          <Sidebar
            onAsk={ask}
            disabled={loading}
            mobileOpen={sidebarOpen}
            onClose={() => setSidebarOpen(false)}
          />

          {/* ===== 채팅 영역 ===== */}
          <div className="flex-1 flex flex-col min-w-0 bg-[#16161a]">
            <ChatHeader onMenu={() => setSidebarOpen(true)} />

            {/* 메시지 스크롤 영역 */}
            <main
              ref={scrollRef}
              className="flex-1 overflow-y-auto px-4 sm:px-6 py-6">
              <div className="max-w-3xl mx-auto space-y-5">
                {!hasChat && !loading && (
                  <div className="h-full grid place-items-center text-center py-16">
                    <div className="flex flex-col items-center">
                      <Avatar size="lg" className="mb-5" />
                      <p className="text-xl font-bold text-zinc-100">
                        안녕하세요, Amy예요 👋
                      </p>
                      <p className="text-sm text-zinc-500 mt-2 max-w-sm leading-relaxed">
                        저에 대해 궁금한 게 있나요? 아래에 메시지를 입력하거나
                        왼쪽 추천 질문을 눌러보세요.
                      </p>
                    </div>
                  </div>
                )}

                {messages.map((m, i) => {
                  if (m.role === 'q') return <QuestionBubble key={i} text={m.text} />;
                  if (m.role === 'error') return <ErrorBubble key={i} text={m.text} />;
                  return <AnswerBubble key={i}>{renderMarkdown(m.text)}</AnswerBubble>;
                })}

                {loading && <AnswerBubble loading />}
              </div>
            </main>

            {/* 입력창 */}
            <ChatInput
              value={input}
              onChange={setInput}
              onSend={handleSend}
              disabled={loading}
              inputRef={inputRef}
            />
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
