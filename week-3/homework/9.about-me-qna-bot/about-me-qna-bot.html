<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Me Q&A — 나를 설명하는 봇</title>

  <!-- ⚠️ 모든 CDN 버전 고정. Babel 은 7.x 고정 (8.x 미지원). -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --sidebar: #f7f8fa;
      --chat: #ffffff;
      --input: #ffffff;
      --accent: #6366f1;
    }
    html, body { background: var(--sidebar); height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #3f3f46;
    }
    #root { height: 100vh; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp { animation: fadeInUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }

    @keyframes bounceDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .typing-dot { animation: bounceDot 1.2s infinite ease-in-out both; }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .online-dot { animation: pulseDot 2s infinite ease-in-out; }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .animate-floaty { animation: floaty 3.5s ease-in-out infinite; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d9dcf3; border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: #b8bdec; }

    textarea { scrollbar-width: thin; }
    .chat-textarea::-webkit-scrollbar { display: none; }
    .chat-textarea { scrollbar-width: none; -ms-overflow-style: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const API_BASE_URL = '/api';

    // 간단한 마크다운 렌더러 (**굵게**, 줄바꿈, 글머리 기호)
    function renderMarkdown(text) {
      const lines = String(text).split('\n');
      const elements = [];
      lines.forEach((line, i) => {
        const parts = line.split(/(\*\*[^*]+\*\*)/g).filter(Boolean);
        const rendered = parts.map((part, j) => {
          if (/^\*\*[^*]+\*\*$/.test(part)) {
            return <strong key={j} className="font-semibold text-indigo-500">{part.slice(2, -2)}</strong>;
          }
          return <React.Fragment key={j}>{part}</React.Fragment>;
        });
        const isBullet = /^\s*[-•]\s+/.test(line);
        if (line.trim() === '') {
          elements.push(<div key={i} className="h-2" />);
          return;
        }
        elements.push(
          <p
            key={i}
            className={isBullet ? 'pl-4 relative leading-relaxed' : 'leading-relaxed'}
          >
            {isBullet && <span className="absolute left-0 text-indigo-400">•</span>}
            {isBullet
              ? rendered.map((r, k) => (typeof r === 'object' && r.props && typeof r.props.children === 'string')
                  ? <React.Fragment key={k}>{r.props.children.replace(/^\s*[-•]\s+/, '')}</React.Fragment>
                  : r)
              : rendered}
          </p>
        );
      });
      return <div className="space-y-1">{elements}</div>;
    }

    function Avatar({ size = 'md', className = '' }) {
      const sizes = {
        xs: 'w-8 h-8 text-base',
        sm: 'w-9 h-9 text-base',
        md: 'w-14 h-14 text-2xl',
        lg: 'w-20 h-20 text-4xl',
      };
      return (
        <div className={`${sizes[size]} ${className} rounded-full grid place-items-center
          bg-gradient-to-br from-indigo-400 via-violet-400 to-blue-300 text-white font-bold
          shadow-md shadow-indigo-200/70 ring-2 ring-white select-none`}>
          🙋‍♀️
        </div>
      );
    }

    function TypingIndicator() {
      return (
        <div className="flex items-center gap-1.5 px-1 py-1">
          {[0, 1, 2].map(i => (
            <span
              key={i}
              className="typing-dot w-2 h-2 rounded-full bg-indigo-400"
              style={{ animationDelay: `${i * 0.16}s` }}
            />
          ))}
        </div>
      );
    }

    function SendIcon({ className = '' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M22 2 11 13" />
          <path d="M22 2 15 22l-4-9-9-4 20-7z" />
        </svg>
      );
    }

    function MenuIcon({ className = '' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      );
    }

    function CloseIcon({ className = '' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      );
    }

    function QuestionBubble({ text }) {
      return (
        <div className="flex justify-end animate-fadeInUp">
          <div className="max-w-[85%] sm:max-w-[75%] px-4 py-3 rounded-[22px] rounded-br-md
            bg-gradient-to-br from-indigo-400 to-violet-400 text-white text-[15px]
            leading-relaxed shadow-sm shadow-indigo-200/80 whitespace-pre-wrap break-words">
            {text}
          </div>
        </div>
      );
    }

    function AnswerBubble({ children, loading }) {
      return (
        <div className="flex justify-start gap-3 animate-fadeInUp">
          <Avatar size="sm" className="mt-0.5 shrink-0" />
          <div className="max-w-[85%] sm:max-w-[75%] px-4 py-3 rounded-[22px] rounded-bl-md
            bg-white border border-indigo-100 text-gray-700 text-[15px]
            shadow-sm shadow-indigo-100/60 break-words">
            {loading ? <TypingIndicator /> : children}
          </div>
        </div>
      );
    }

    function ErrorBubble({ text }) {
      return (
        <div className="flex justify-start gap-3 animate-fadeInUp">
          <Avatar size="sm" className="mt-0.5 shrink-0" />
          <div className="max-w-[85%] sm:max-w-[75%] px-4 py-3 rounded-[22px] rounded-bl-md
            bg-red-50 border border-red-200 text-red-500 text-[15px] break-words">
            {text}
          </div>
        </div>
      );
    }

    const SUGGESTIONS = [
      '이 사람 무슨 일 해?',
      '어떤 프로젝트 담당하고 있어?',
      'MBTI가 뭐야?',
      '어떤 툴 써?',
      '요즘 뭐 배워?',
      '취미가 뭐야?',
      '좋아하는 게 뭐야?',
      '디자인 철학이 뭐야?',
      '2026년 목표가 뭐야?',
      '스트레스는 어떻게 풀어?',
    ];

    function Sidebar({ onAsk, disabled, mobileOpen, onClose }) {
      return (
        <>
          {mobileOpen && (
            <div
              onClick={onClose}
              className="fixed inset-0 bg-indigo-900/20 backdrop-blur-sm z-30 md:hidden"
              aria-hidden="true"
            />
          )}

          <aside className={`
            fixed md:static top-0 left-0 z-40 h-full w-[290px] shrink-0
            bg-[#f7f8fa] border-r border-indigo-100 flex flex-col
            transition-transform duration-300 ease-out
            ${mobileOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0
          `}>
            <button
              onClick={onClose}
              aria-label="사이드바 닫기"
              className="md:hidden absolute top-4 right-4 p-1.5 rounded-lg
                text-gray-400 hover:text-indigo-500 hover:bg-indigo-100 transition-colors">
              <CloseIcon className="w-5 h-5" />
            </button>

            <div className="p-6 border-b border-indigo-100">
              <div className="flex flex-col items-center text-center">
                <Avatar size="lg" className="mb-4 animate-floaty" />
                <h2 className="text-xl font-bold text-gray-800">Amy <span className="text-indigo-400">✨</span></h2>
                <p className="mt-1 text-sm text-indigo-400 font-semibold">
                  Product Designer
                </p>
                <p className="text-xs text-gray-400 mt-0.5">@ NEW ID</p>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-5">
              <p className="text-xs font-bold uppercase tracking-wider text-indigo-400 mb-3 px-1">
                💬 추천 질문
              </p>
              <div className="space-y-2">
                {SUGGESTIONS.map(s => (
                  <button
                    key={s}
                    type="button"
                    onClick={() => onAsk(s)}
                    disabled={disabled}
                    className="w-full text-left px-4 py-3 rounded-2xl text-sm font-medium
                      bg-white border border-indigo-100 text-gray-600 shadow-sm shadow-indigo-100/40
                      hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-500
                      active:scale-[0.98]
                      transition-all duration-200
                      disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-white
                      disabled:hover:border-indigo-100 flex items-center gap-2.5">
                    <span>💡</span>
                    {s}
                  </button>
                ))}
              </div>
            </div>

            <div className="p-5 border-t border-indigo-100">
              <p className="text-xs leading-relaxed text-gray-400">
                Amy를 대신해 답해주는 AI Q&A 봇이에요 ✨ 답변은 Amy의{' '}
                <span className="text-indigo-400 font-medium">about-me.md</span> 내용만 근거로 생성됩니다.
              </p>
            </div>
          </aside>
        </>
      );
    }

    function ChatHeader({ onMenu }) {
      return (
        <header className="flex items-center gap-3 px-4 sm:px-6 py-3.5
          border-b border-indigo-100 bg-white/80 backdrop-blur-md shrink-0">
          <button
            onClick={onMenu}
            aria-label="메뉴 열기"
            className="md:hidden p-1.5 rounded-lg text-gray-400 hover:text-indigo-500
              hover:bg-indigo-100 transition-colors">
            <MenuIcon className="w-5 h-5" />
          </button>

          <Avatar size="xs" className="shrink-0" />
          <div className="min-w-0">
            <p className="text-[15px] font-bold text-gray-800 leading-tight">Amy</p>
            <p className="flex items-center gap-1.5 text-xs text-gray-400">
              <span className="online-dot w-1.5 h-1.5 rounded-full bg-green-400 inline-block" />
              온라인
            </p>
          </div>
        </header>
      );
    }

    function ChatInput({ value, onChange, onSend, disabled, inputRef }) {
      useEffect(() => {
        const el = inputRef.current;
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
      }, [value]);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          onSend();
        }
      };

      return (
        <div className="px-4 sm:px-6 py-4 bg-white shrink-0">
          <div className="max-w-3xl mx-auto">
            <div className="flex items-end gap-2 p-2 rounded-[26px]
              bg-white border border-indigo-200 shadow-md shadow-indigo-100/60
              focus-within:border-indigo-400 focus-within:shadow-indigo-200/70 transition-all">
              <textarea
                ref={inputRef}
                rows={1}
                value={value}
                onChange={(e) => onChange(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="Amy에 대해 궁금한 걸 물어보세요…"
                aria-label="질문 입력"
                autoFocus
                className="chat-textarea flex-1 bg-transparent px-3 py-2 text-[15px] text-gray-800 resize-none
                  placeholder:text-gray-400 focus:outline-none leading-relaxed
                  max-h-40 overflow-y-auto"
              />
              <button
                type="button"
                onClick={onSend}
                disabled={disabled || !value.trim()}
                aria-label="질문 전송"
                className="shrink-0 w-10 h-10 grid place-items-center rounded-full
                  bg-gradient-to-br from-indigo-400 to-violet-400 hover:from-indigo-500 hover:to-violet-500
                  active:scale-90 text-white shadow-sm shadow-indigo-200
                  disabled:from-indigo-200 disabled:to-violet-200 disabled:text-white/70 disabled:cursor-not-allowed
                  disabled:active:scale-100 disabled:shadow-none transition-all duration-150">
                <SendIcon className="w-5 h-5" />
              </button>
            </div>
            <p className="text-center text-[11px] text-gray-400 mt-2.5">
              Enter 전송 · Shift + Enter 줄바꿈
            </p>
          </div>
        </div>
      );
    }

    function App() {
      const [input, setInput] = useState('');
      const [messages, setMessages] = useState([]); // { role: 'q'|'a'|'error', text }
      const [loading, setLoading] = useState(false);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const scrollRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
        }
      }, [messages, loading]);

      const ask = useCallback(async (question) => {
        const q = question.trim();
        if (!q || loading) return;

        setSidebarOpen(false);
        setMessages(prev => [...prev, { role: 'q', text: q }]);
        setInput('');
        setLoading(true);

        try {
          const res = await fetch(`${API_BASE_URL}/ask`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q }),
          });
          if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
          const data = await res.json();
          setMessages(prev => [...prev, { role: 'a', text: data.answer ?? '답변을 받지 못했어요.' }]);
        } catch (err) {
          setMessages(prev => [...prev, {
            role: 'error',
            text: `답변을 가져오지 못했어요. ${err.message || ''} 서버가 실행 중인지 확인해 주세요.`,
          }]);
        } finally {
          setLoading(false);
          inputRef.current && inputRef.current.focus();
        }
      }, [loading]);

      const handleSend = () => ask(input);

      const hasChat = messages.length > 0;

      return (
        <div className="flex h-full bg-[#f7f8fa] text-gray-800 overflow-hidden">

          <Sidebar
            onAsk={ask}
            disabled={loading}
            mobileOpen={sidebarOpen}
            onClose={() => setSidebarOpen(false)}
          />

          <div className="flex-1 flex flex-col min-w-0 bg-white">
            <ChatHeader onMenu={() => setSidebarOpen(true)} />

            <main
              ref={scrollRef}
              className="flex-1 overflow-y-auto px-4 sm:px-6 py-6 bg-gradient-to-b from-indigo-50/40 to-white">
              <div className="max-w-3xl mx-auto space-y-5">
                {!hasChat && !loading && (
                  <div className="h-full grid place-items-center text-center py-16">
                    <div className="flex flex-col items-center">
                      <Avatar size="lg" className="mb-5 animate-floaty" />
                      <p className="text-xl font-bold text-gray-800">
                        안녕하세요, Amy예요 👋
                      </p>
                      <p className="text-sm text-gray-500 mt-2 max-w-sm leading-relaxed">
                        저에 대해 궁금한 게 있나요? 아래에 메시지를 입력하거나
                        왼쪽 추천 질문을 눌러보세요 ✨
                      </p>
                    </div>
                  </div>
                )}

                {messages.map((m, i) => {
                  if (m.role === 'q') return <QuestionBubble key={i} text={m.text} />;
                  if (m.role === 'error') return <ErrorBubble key={i} text={m.text} />;
                  return <AnswerBubble key={i}>{renderMarkdown(m.text)}</AnswerBubble>;
                })}

                {loading && <AnswerBubble loading />}
              </div>
            </main>

            <ChatInput
              value={input}
              onChange={setInput}
              onSend={handleSend}
              disabled={loading}
              inputRef={inputRef}
            />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
