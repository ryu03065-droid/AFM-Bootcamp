<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날씨 옷차림 추천</title>

  <!-- ⚠️ 모든 CDN 버전 고정. Babel 은 7.x 로 고정 (8.x 인라인 text/babel 미지원). -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }

    html, body { margin: 0; min-height: 100%; }

    /* 날씨별 배경 그라데이션 (다크) */
    #bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      transition: background 1s ease;
    }

    /* 배경 위 글로우(태양/달 느낌) */
    #glow {
      position: fixed;
      inset: 0;
      z-index: -1;
      transition: opacity 1s ease, background 1s ease;
      pointer-events: none;
    }

    /* ── 카드 등장: staggered fadeUp ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeUp { animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both; }

    /* ── 떠다니는 이모지 ── */
    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-14px) rotate(2deg); }
    }
    .animate-floaty { animation: floaty 3.2s ease-in-out infinite; }

    /* ── 로딩 이모지 pulse ── */
    @keyframes pulseScale {
      0%, 100% { transform: scale(1); opacity: .6; }
      50%      { transform: scale(1.18); opacity: 1; }
    }
    .animate-pulseScale { animation: pulseScale 1.3s ease-in-out infinite; }

    /* 스켈레톤 shimmer */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.15) 37%, rgba(255,255,255,.05) 63%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    /* ── 가로 스크롤 칩: 스크롤바 숨김 ── */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ====== 날씨 파티클 ====== */
    .particles { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }

    /* 비 */
    @keyframes rainFall {
      to { transform: translateY(115vh); }
    }
    .rain-drop {
      position: absolute;
      top: -10%;
      width: 2px;
      height: 70px;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(173,200,230,.55));
      animation: rainFall linear infinite;
    }

    /* 눈 */
    @keyframes snowFall {
      0%   { transform: translateY(-10vh) translateX(0); }
      100% { transform: translateY(110vh) translateX(40px); }
    }
    .snow-flake {
      position: absolute;
      top: -5%;
      color: #fff;
      opacity: .85;
      animation: snowFall linear infinite;
    }

    /* 구름 */
    @keyframes cloudDrift {
      from { transform: translateX(-30vw); }
      to   { transform: translateX(130vw); }
    }
    .cloud {
      position: absolute;
      font-size: 7rem;
      opacity: .12;
      filter: blur(2px);
      animation: cloudDrift linear infinite;
    }

    /* 맑음: 반짝이는 별/스파클 */
    @keyframes twinkle {
      0%, 100% { opacity: .15; transform: scale(.8); }
      50%      { opacity: .9;  transform: scale(1.2); }
    }
    .spark {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 9999px;
      background: #fff;
      box-shadow: 0 0 6px 1px rgba(255,255,255,.8);
      animation: twinkle ease-in-out infinite;
    }
  </style>
</head>
<body class="min-h-screen text-white overflow-x-hidden">
  <div id="bg"></div>
  <div id="glow"></div>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useCallback, useMemo } = React;

    // ========================================
    // 설정 / 상수
    // ========================================
    const API_BASE_URL = '/'; // 같은 서버에서 서빙 → 상대경로

    const CITIES = [
      { name: '서울', emoji: '🇰🇷', lat: 37.5665, lon: 126.9780 },
      { name: '부산', emoji: '🌊', lat: 35.1796, lon: 129.0756 },
      { name: '제주', emoji: '🍊', lat: 33.4996, lon: 126.5312 },
      { name: '도쿄', emoji: '🗼', lat: 35.6762, lon: 139.6503 },
      { name: '뉴욕', emoji: '🗽', lat: 40.7128, lon: -74.0060 },
    ];

    // 날씨 설명 키워드 → 테마(배경/글로우/파티클 종류)
    // kind: 'clear' | 'clouds' | 'rain' | 'snow' | 'fog'
    function getTheme(desc) {
      const d = desc || '';
      if (d.includes('비') || d.includes('소나기') || d.includes('뇌우'))
        return {
          kind: 'rain',
          bg: 'radial-gradient(120% 120% at 50% 0%, #1e293b 0%, #0f172a 45%, #020617 100%)',
          glow: 'radial-gradient(60% 50% at 50% -10%, rgba(56,89,140,.45), transparent 70%)',
          accent: '#60a5fa',
        };
      if (d.includes('눈'))
        return {
          kind: 'snow',
          bg: 'radial-gradient(120% 120% at 50% 0%, #312e81 0%, #1e1b4b 50%, #0b1020 100%)',
          glow: 'radial-gradient(60% 50% at 50% -10%, rgba(199,210,254,.40), transparent 70%)',
          accent: '#c4b5fd',
        };
      if (d.includes('흐림') || d.includes('구름'))
        return {
          kind: 'clouds',
          bg: 'radial-gradient(120% 120% at 50% 0%, #334155 0%, #1e293b 50%, #0b1220 100%)',
          glow: 'radial-gradient(60% 50% at 50% -10%, rgba(148,163,184,.32), transparent 70%)',
          accent: '#94a3b8',
        };
      if (d.includes('안개'))
        return {
          kind: 'fog',
          bg: 'radial-gradient(120% 120% at 50% 0%, #3f3f46 0%, #27272a 50%, #0c0c0e 100%)',
          glow: 'radial-gradient(60% 50% at 50% -10%, rgba(212,212,216,.28), transparent 70%)',
          accent: '#a1a1aa',
        };
      // 맑음 / 기본
      return {
        kind: 'clear',
        bg: 'radial-gradient(120% 120% at 50% 0%, #0ea5e9 0%, #0c4a6e 45%, #05182b 100%)',
        glow: 'radial-gradient(55% 45% at 78% 8%, rgba(253,224,71,.55), transparent 60%)',
        accent: '#fde047',
      };
    }

    // ========================================
    // 🌧️ 날씨 파티클 (CSS-only, 날씨별)
    // ========================================
    function Particles({ kind }) {
      const items = useMemo(() => {
        if (kind === 'rain') {
          return Array.from({ length: 60 }, (_, i) => ({
            left: Math.random() * 100,
            delay: Math.random() * 2,
            dur: 0.6 + Math.random() * 0.6,
            h: 40 + Math.random() * 50,
            o: 0.3 + Math.random() * 0.5,
          }));
        }
        if (kind === 'snow') {
          return Array.from({ length: 45 }, () => ({
            left: Math.random() * 100,
            delay: Math.random() * 6,
            dur: 6 + Math.random() * 7,
            size: 8 + Math.random() * 16,
            o: 0.5 + Math.random() * 0.5,
          }));
        }
        if (kind === 'clouds' || kind === 'fog') {
          return Array.from({ length: 6 }, (_, i) => ({
            top: 5 + Math.random() * 60,
            delay: Math.random() * 30,
            dur: 40 + Math.random() * 40,
            scale: 0.7 + Math.random() * 1.1,
          }));
        }
        // clear → sparkles
        return Array.from({ length: 36 }, () => ({
          left: Math.random() * 100,
          top: Math.random() * 75,
          delay: Math.random() * 4,
          dur: 2 + Math.random() * 3,
        }));
      }, [kind]);

      if (kind === 'rain') {
        return (
          <div className="particles" aria-hidden="true">
            {items.map((p, i) => (
              <span key={i} className="rain-drop" style={{
                left: `${p.left}%`, height: `${p.h}px`, opacity: p.o,
                animationDuration: `${p.dur}s`, animationDelay: `${p.delay}s`,
              }} />
            ))}
          </div>
        );
      }
      if (kind === 'snow') {
        return (
          <div className="particles" aria-hidden="true">
            {items.map((p, i) => (
              <span key={i} className="snow-flake" style={{
                left: `${p.left}%`, fontSize: `${p.size}px`, opacity: p.o,
                animationDuration: `${p.dur}s`, animationDelay: `${p.delay}s`,
              }}>❄</span>
            ))}
          </div>
        );
      }
      if (kind === 'clouds' || kind === 'fog') {
        return (
          <div className="particles" aria-hidden="true">
            {items.map((p, i) => (
              <span key={i} className="cloud" style={{
                top: `${p.top}%`,
                transform: `scale(${p.scale})`,
                animationDuration: `${p.dur}s`, animationDelay: `${p.delay}s`,
              }}>☁️</span>
            ))}
          </div>
        );
      }
      // clear sparkles
      return (
        <div className="particles" aria-hidden="true">
          {items.map((p, i) => (
            <span key={i} className="spark" style={{
              left: `${p.left}%`, top: `${p.top}%`,
              animationDuration: `${p.dur}s`, animationDelay: `${p.delay}s`,
            }} />
          ))}
        </div>
      );
    }

    // ========================================
    // 🎨 Design System Components (Glass)
    // ========================================
    function GlassCard({ children, className = '', style }) {
      return (
        <div
          style={style}
          className={`backdrop-blur-xl bg-white/10 border border-white/15
            rounded-3xl shadow-2xl shadow-black/30 ${className}`}
        >
          {children}
        </div>
      );
    }

    function CityChip({ city, active, disabled, onClick }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          aria-pressed={active}
          className={`shrink-0 px-5 py-2.5 rounded-full font-bold text-sm whitespace-nowrap
            border transition-all duration-300 active:scale-95
            disabled:cursor-not-allowed
            ${active
              ? 'bg-white text-slate-900 border-white shadow-lg shadow-black/30 scale-105'
              : 'bg-white/10 text-white/90 border-white/20 hover:bg-white/20 backdrop-blur-md'}`}
        >
          <span className="mr-1">{city.emoji}</span>{city.name}
        </button>
      );
    }

    function Button({ children, onClick, disabled, className = '' }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`px-6 py-3 rounded-2xl font-bold text-slate-900 bg-white shadow-lg
            transition active:scale-95 hover:bg-white/90
            disabled:opacity-50 disabled:cursor-not-allowed ${className}`}
        >
          {children}
        </button>
      );
    }

    // ========================================
    // 🧊 로딩 스켈레톤
    // ========================================
    function LoadingSkeleton() {
      return (
        <div className="space-y-6 animate-fadeUp">
          <GlassCard className="p-8 text-center">
            <div className="text-7xl mb-4 animate-pulseScale">🌤️</div>
            <div className="skeleton h-4 w-28 rounded-full mx-auto mb-4" />
            <div className="skeleton h-24 w-40 rounded-2xl mx-auto mb-6" />
            <div className="grid grid-cols-3 gap-3">
              {[0,1,2].map(i => <div key={i} className="skeleton h-16 rounded-2xl" />)}
            </div>
          </GlassCard>
          <GlassCard className="p-8 text-center">
            <div className="skeleton h-20 w-20 rounded-full mx-auto mb-4" />
            <div className="skeleton h-6 w-32 rounded-full mx-auto mb-3" />
            <div className="skeleton h-4 w-48 rounded-full mx-auto" />
          </GlassCard>
          <p className="text-center text-white/70 font-medium">날씨를 불러오는 중...</p>
        </div>
      );
    }

    // ========================================
    // 🌡️ 히어로 (현재 날씨 대형 타이포)
    // ========================================
    function WeatherHero({ data, accent }) {
      const stats = [
        { label: '체감온도', value: `${Math.round(data.feelsLike)}°`, icon: '🌡️' },
        { label: '바람', value: `${data.windspeed} m/s`, icon: '💨' },
        { label: '날씨', value: data.weatherDesc, icon: '🌥️' },
      ];
      return (
        <GlassCard className="p-7 sm:p-9 animate-fadeUp" style={{ animationDelay: '0.05s' }}>
          <p className="text-sm font-semibold text-white/60 mb-1 tracking-wide">현재 기온</p>

          <div className="flex items-end justify-center my-2">
            <span
              className="font-black leading-none text-transparent bg-clip-text"
              style={{
                fontSize: 'clamp(5.5rem, 26vw, 9rem)',
                backgroundImage: `linear-gradient(180deg, #ffffff 0%, ${accent} 130%)`,
              }}
            >
              {Math.round(data.temperature)}
            </span>
            <span className="text-5xl sm:text-6xl font-black text-white/80 mb-3">°</span>
          </div>

          <p className="text-center text-xl font-bold text-white/90 mb-6">{data.weatherDesc}</p>

          <div className="grid grid-cols-3 gap-3">
            {stats.map((s) => (
              <div key={s.label} className="rounded-2xl bg-white/10 border border-white/10 py-3 px-1 text-center">
                <div className="text-lg mb-0.5">{s.icon}</div>
                <p className="text-[11px] font-medium text-white/55 mb-0.5">{s.label}</p>
                <p className="text-sm sm:text-base font-bold text-white truncate">{s.value}</p>
              </div>
            ))}
          </div>
        </GlassCard>
      );
    }

    // ========================================
    // 👕 옷차림 추천 카드
    // ========================================
    function OutfitCard({ rec }) {
      const color = rec.color || '#fb923c';
      return (
        <GlassCard
          className="p-8 text-center relative overflow-hidden animate-fadeUp"
          style={{ animationDelay: '0.18s' }}
        >
          {/* 상단 포인트 라인 */}
          <div className="absolute top-0 left-0 right-0 h-1.5"
               style={{ background: `linear-gradient(90deg, transparent, ${color}, transparent)` }} />
          {/* 포인트 글로우 */}
          <div className="absolute -top-16 left-1/2 -translate-x-1/2 w-56 h-56 rounded-full blur-3xl opacity-40 pointer-events-none"
               style={{ background: color }} />

          <p className="relative text-sm font-semibold text-white/60 mb-3 tracking-wide">오늘의 옷차림 추천</p>

          <div className="relative text-7xl sm:text-8xl mb-5 animate-floaty"
               style={{ filter: `drop-shadow(0 10px 24px ${color}66)` }}>
            {rec.emoji}
          </div>

          <span
            className="relative inline-block px-4 py-1 rounded-full text-xs font-bold text-white mb-4 shadow-lg"
            style={{ backgroundColor: color, boxShadow: `0 6px 20px ${color}66` }}
          >
            {rec.level}
          </span>

          <h3 className="relative text-3xl sm:text-4xl font-black mb-3 text-white">
            {rec.outfit}
          </h3>
          <p className="relative text-base sm:text-lg text-white/75 font-medium leading-relaxed">
            {rec.detail}
          </p>
        </GlassCard>
      );
    }

    // ========================================
    // ⚠️ 에러
    // ========================================
    function ErrorMessage({ message, onRetry }) {
      return (
        <GlassCard className="p-8 text-center animate-fadeUp">
          <div className="text-6xl mb-4">😢</div>
          <h3 className="text-xl font-bold text-white mb-2">날씨를 불러오지 못했어요</h3>
          <p className="text-white/60 mb-6">{message}</p>
          <Button onClick={onRetry}>다시 시도</Button>
        </GlassCard>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [cityIdx, setCityIdx] = useState(0);
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const theme = useMemo(() => getTheme(data?.weatherDesc), [data?.weatherDesc]);

      // 배경/글로우 테마 적용
      useEffect(() => {
        document.getElementById('bg').style.background = theme.bg;
        document.getElementById('glow').style.background = theme.glow;
      }, [theme.bg, theme.glow]);

      const fetchWeather = useCallback(async (idx) => {
        const city = CITIES[idx];
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(`${API_BASE_URL}recommend?lat=${city.lat}&lon=${city.lon}`);
          if (!res.ok) throw new Error(`서버 응답 오류 (${res.status})`);
          const json = await res.json();
          setData(json);
        } catch (e) {
          setError(e.message || '네트워크 오류가 발생했어요.');
          setData(null);
        } finally {
          setLoading(false);
        }
      }, []);

      // 페이지 로드 시 서울 자동 조회
      useEffect(() => {
        fetchWeather(0);
      }, [fetchWeather]);

      // 도시 칩 클릭 → 즉시 조회 (로딩 중엔 무시, 같은 도시도 재조회 허용)
      const handleSelectCity = (idx) => {
        if (loading) return;
        setCityIdx(idx);
        fetchWeather(idx);
      };

      return (
        <>
          {/* 날씨별 움직이는 배경 파티클 */}
          <Particles kind={theme.kind} />

          <div className="min-h-screen w-full px-4 py-8 sm:py-12">
            <div className="max-w-md mx-auto">

              {/* 헤더 */}
              <header className="text-center mb-7 animate-fadeUp">
                <h1 className="text-3xl sm:text-4xl font-black mb-1.5 tracking-tight drop-shadow-lg">
                  오늘 뭐 입지?
                </h1>
                <p className="text-white/65 font-medium">날씨 맞춤 옷차림 추천 ✨</p>
              </header>

              {/* 도시 선택 칩 (가로 스크롤) */}
              <div className="mb-6 animate-fadeUp" style={{ animationDelay: '0.03s' }}>
                <div className="flex gap-2.5 overflow-x-auto no-scrollbar pb-2 -mx-1 px-1">
                  {CITIES.map((city, i) => (
                    <CityChip
                      key={city.name}
                      city={city}
                      active={i === cityIdx}
                      disabled={loading}
                      onClick={() => handleSelectCity(i)}
                    />
                  ))}
                </div>
              </div>

              {/* 결과 영역 */}
              <div className="space-y-6">
                {loading && <LoadingSkeleton />}
                {!loading && error && <ErrorMessage message={error} onRetry={() => fetchWeather(cityIdx)} />}
                {!loading && !error && data && (
                  <>
                    <WeatherHero data={data} accent={theme.accent} />
                    {data.recommendation && <OutfitCard rec={data.recommendation} />}
                  </>
                )}
              </div>

              <footer className="text-center mt-10 text-white/45 text-sm">
                데이터 제공: OpenWeatherMap
              </footer>
            </div>
          </div>
        </>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
