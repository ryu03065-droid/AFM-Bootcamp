<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>직장인 고민 상담소</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <!-- ⚠️ 모든 CDN은 버전 고정. Babel은 반드시 7.x. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    /* Tailwind 으로 처리 불가능한 애니메이션만 정의 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeInUp 0.35s ease-out; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    .typing-dot { animation: typingBounce 1.2s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    /* 스크롤바 살짝 다듬기 */
    .chat-scroll::-webkit-scrollbar { width: 8px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 9999px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useRef, useEffect, useCallback } = React;

    // ========================================
    // API 통신
    // ========================================
    async function sendMessage(messages) {
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        return data.reply;
      } catch {
        return '지금은 연결이 어렵네요. 잠시 후 다시 시도해 주세요 🙏';
      }
    }

    // 고민 유형 빠른 선택 목록
    const QUICK_TOPICS = [
      '야근/업무 과부하',
      '상사 갈등',
      '동료 관계',
      '이직 고민',
      '번아웃',
      '연봉/평가'
    ];

    // AI 첫 인사 메시지
    const GREETING = '안녕하세요 😊 저는 직장 고민을 함께 나눌 상담사예요. 오늘 어떤 일이 있으셨나요? 편하게 말씀해 주세요.';

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // 고민 유형 빠른 선택 칩
    function TopicChip({ label, onClick }) {
      return (
        <button
          type="button"
          onClick={() => onClick(label)}
          className="px-3.5 py-2 text-sm font-medium text-indigo-700 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-full transition-colors whitespace-nowrap"
        >
          {label}
        </button>
      );
    }

    // 메시지 버블
    function MessageBubble({ role, content }) {
      const isUser = role === 'user';
      return (
        <div className={`flex animate-fade-in ${isUser ? 'justify-end' : 'justify-start'}`}>
          {!isUser && (
            <div className="flex-shrink-0 w-9 h-9 rounded-full bg-white shadow-sm border border-gray-200 flex items-center justify-center text-lg mr-2 mt-0.5">
              💼
            </div>
          )}
          <div
            className={
              isUser
                ? 'max-w-[78%] px-4 py-3 rounded-2xl rounded-tr-sm bg-indigo-600 text-white text-[15px] leading-relaxed whitespace-pre-wrap break-words'
                : 'max-w-[78%] px-4 py-3 rounded-2xl rounded-tl-sm bg-white text-gray-900 text-[15px] leading-relaxed whitespace-pre-wrap break-words shadow-sm border border-gray-100'
            }
          >
            {content}
          </div>
        </div>
      );
    }

    // 타이핑 인디케이터
    function TypingIndicator() {
      return (
        <div className="flex justify-start animate-fade-in">
          <div className="flex-shrink-0 w-9 h-9 rounded-full bg-white shadow-sm border border-gray-200 flex items-center justify-center text-lg mr-2 mt-0.5">
            💼
          </div>
          <div className="px-4 py-3.5 rounded-2xl rounded-tl-sm bg-white shadow-sm border border-gray-100 flex items-center gap-2">
            <span className="text-sm text-gray-500">상담사가 답변 중</span>
            <span className="flex gap-1">
              <span className="typing-dot w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
              <span className="typing-dot w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
              <span className="typing-dot w-1.5 h-1.5 rounded-full bg-indigo-400"></span>
            </span>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Layout Components
    // ========================================

    function Header({ onReset, hasMessages }) {
      return (
        <header className="flex-shrink-0 bg-white border-b border-gray-200">
          <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-xl shadow-sm">
                💼
              </div>
              <div>
                <h1 className="text-base font-bold text-gray-900 leading-tight">직장인 고민 상담소</h1>
                <p className="text-xs text-gray-500">익명으로 털어놓으세요 💼</p>
              </div>
            </div>
            <button
              type="button"
              onClick={onReset}
              disabled={!hasMessages}
              aria-label="대화 초기화"
              title="대화 초기화"
              className="w-10 h-10 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent"
            >
              <span className="text-lg">🗑️</span>
            </button>
          </div>
        </header>
      );
    }

    // 웰컴 카드 (대화 시작 전)
    function WelcomeCard({ onTopic }) {
      return (
        <div className="animate-fade-in">
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <div className="flex items-start gap-3">
              <div className="flex-shrink-0 w-11 h-11 rounded-full bg-indigo-50 flex items-center justify-center text-2xl">
                💼
              </div>
              <div className="flex-1">
                <h2 className="text-lg font-bold text-gray-900 mb-1">오늘 하루 어떠셨나요?</h2>
                <p className="text-[15px] text-gray-600 leading-relaxed">
                  {GREETING}
                </p>
              </div>
            </div>

            <div className="mt-5 pt-5 border-t border-gray-100">
              <p className="text-xs font-semibold text-gray-400 mb-3 tracking-wide">이런 고민이 있으신가요?</p>
              <div className="flex flex-wrap gap-2">
                {QUICK_TOPICS.map((t) => (
                  <TopicChip key={t} label={t} onClick={onTopic} />
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // 입력 영역
    function ChatInput({ value, onChange, onSend, disabled, loading }) {
      const textareaRef = useRef(null);

      // 높이 자동 조절 (최대 4줄)
      useEffect(() => {
        const el = textareaRef.current;
        if (!el) return;
        el.style.height = 'auto';
        const lineHeight = 24; // 대략 1줄 높이(px)
        const maxHeight = lineHeight * 4 + 16; // 4줄 + 패딩
        el.style.height = Math.min(el.scrollHeight, maxHeight) + 'px';
        el.style.overflowY = el.scrollHeight > maxHeight ? 'auto' : 'hidden';
      }, [value]);

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          onSend();
        }
      };

      const canSend = value.trim().length > 0 && !disabled;

      return (
        <div className="flex-shrink-0 bg-white border-t border-gray-200">
          <div className="max-w-3xl mx-auto px-4 py-3">
            <div className="flex items-end gap-2 bg-gray-50 border border-gray-200 rounded-2xl px-3 py-2 focus-within:border-indigo-400 focus-within:ring-2 focus-within:ring-indigo-100 transition-all">
              <textarea
                ref={textareaRef}
                rows={1}
                value={value}
                onChange={(e) => onChange(e.target.value)}
                onKeyDown={handleKeyDown}
                disabled={disabled}
                placeholder="직장에서 있었던 일을 편하게 적어보세요..."
                className="flex-1 resize-none bg-transparent text-[15px] text-gray-900 placeholder-gray-400 outline-none leading-6 py-1.5 max-h-28 disabled:opacity-60"
              />
              <button
                type="button"
                onClick={onSend}
                disabled={!canSend}
                aria-label="전송"
                className="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
              >
                {loading ? (
                  <svg className="w-5 h-5 animate-spin" viewBox="0 0 24 24" fill="none">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
                  </svg>
                ) : (
                  <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                  </svg>
                )}
              </button>
            </div>
            <p className="text-[11px] text-gray-400 mt-1.5 px-1">
              Enter 전송 · Shift+Enter 줄바꿈
            </p>
          </div>
        </div>
      );
    }

    // 접을 수 있는 빠른 선택 바 (대화 시작 후)
    function QuickTopicBar({ onTopic }) {
      const [open, setOpen] = useState(false);
      return (
        <div className="max-w-3xl mx-auto px-4 pb-1">
          <button
            type="button"
            onClick={() => setOpen((v) => !v)}
            className="flex items-center gap-1 text-xs font-medium text-gray-500 hover:text-indigo-600 transition-colors py-1.5"
            aria-expanded={open}
          >
            <span>고민 유형 빠른 선택</span>
            <svg
              className={`w-3.5 h-3.5 transition-transform ${open ? 'rotate-180' : ''}`}
              viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
            >
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          {open && (
            <div className="flex flex-wrap gap-2 pb-2 animate-fade-in">
              {QUICK_TOPICS.map((t) => (
                <TopicChip key={t} label={t} onClick={(label) => { onTopic(label); setOpen(false); }} />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 📄 Chat Page (메인 화면)
    // ========================================
    function ChatApp() {
      const [messages, setMessages] = useState([]); // { role, content }
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const scrollRef = useRef(null);
      const bottomRef = useRef(null);

      const hasMessages = messages.length > 0;

      // 자동 스크롤 맨 아래로
      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      // 빠른 선택 -> 입력창에 자동 입력
      const handleTopic = useCallback((label) => {
        setInput((prev) => (prev ? prev : label));
      }, []);

      // 메시지 전송
      const handleSend = useCallback(async () => {
        const text = input.trim();
        if (!text || loading) return;

        const userMsg = { role: 'user', content: text };
        const nextMessages = [...messages, userMsg];
        setMessages(nextMessages);
        setInput('');
        setLoading(true);

        const reply = await sendMessage(nextMessages);
        setMessages((prev) => [...prev, { role: 'assistant', content: reply }]);
        setLoading(false);
      }, [input, loading, messages]);

      // 대화 초기화
      const handleReset = useCallback(() => {
        if (!hasMessages) return;
        if (window.confirm('대화 내용을 모두 지울까요?')) {
          setMessages([]);
          setInput('');
        }
      }, [hasMessages]);

      return (
        <div className="flex flex-col h-screen bg-gray-50">
          <Header onReset={handleReset} hasMessages={hasMessages} />

          {/* 채팅 영역 */}
          <main ref={scrollRef} className="flex-1 overflow-y-auto chat-scroll">
            <div className="max-w-3xl mx-auto px-4 py-5 space-y-4">
              {/* 웰컴 카드는 항상 상단에 노출 */}
              <WelcomeCard onTopic={handleTopic} />

              {/* 메시지 목록 */}
              {messages.map((m, i) => (
                <MessageBubble key={i} role={m.role} content={m.content} />
              ))}

              {loading && <TypingIndicator />}

              <div ref={bottomRef} />
            </div>
          </main>

          {/* 대화 시작 후에만 빠른 선택 토글 노출 */}
          {hasMessages && (
            <div className="flex-shrink-0 bg-gray-50">
              <QuickTopicBar onTopic={handleTopic} />
            </div>
          )}

          <ChatInput
            value={input}
            onChange={setInput}
            onSend={handleSend}
            disabled={loading}
            loading={loading}
          />
        </div>
      );
    }

    // ========================================
    // 🚀 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<ChatApp />);
  </script>
</body>
</html>
